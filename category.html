    <style>
      ::-webkit-scrollbar { display: none !important; }
      body { position: relative; scroll-behavior: smooth; letter-spacing: 0.025em; background-color: #181818; }
      body::before {
        content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        background-image: linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
        background-size: 40px 40px; pointer-events: none;

      #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      #overlay { transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s; }
      #overlay.show { opacity: 1 !important; visibility: visible !important; }
      @media (max-width: 767px) {
        #sidebar { transform: translateX(-100%); }
        #sidebar.open { transform: translateX(0); }
      }
      @media (min-width: 768px) {
        body { padding-left: 16rem; }
        #sidebar { transform: translateX(0) !important; }
        #overlay { display: none !important; }
        #sidebarToggle { display: none !important; }
        #sidebarClose { display: none !important; }
      }
      .fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

      .method-badge {
        display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 8px;
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.5px; font-family: "Ubuntu Mono", monospace; flex-shrink: 0;
      }
      .method-get    { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
      .method-post   { background: rgba(16,185,129,0.12); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
      .method-put    { background: rgba(245,158,11,0.12);  color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
      .method-delete { background: rgba(239,68,68,0.12);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
      .method-patch  { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }

      .ep-toggle-btn {
        width: 100%; background: #212121; border: 1px solid #2e2e2e; color: #fff;
        padding: 16px 20px; display: flex; align-items: flex-start; justify-content: space-between;
        cursor: pointer; font-family: "Space Grotesk", sans-serif; text-align: left;
        transition: all 0.2s; gap: 12px; border-radius: 12px;
      }
      .ep-item { margin-bottom: 6px; }
      .ep-item.active .ep-toggle-btn { border-radius: 12px 12px 0 0; border-bottom: 1px solid #2e2e2e; background: #1a1a1a; }
      .ep-toggle-btn:hover { background: #1c1c1c; border-color: #383838; }

      .ep-detail-panel {
        background: #141414; border: 1px solid #2e2e2e; border-top: none;
        border-radius: 0 0 12px 12px; display: none;
      }
      .ep-detail-panel.open { display: block; animation: fadeIn 0.3s ease-out; }

      .detail-block { padding: 20px 24px; border-bottom: 1px solid #2e2e2e; }
      .detail-block:last-child { border-bottom: none; }

      .cat-toggle-btn {
        width: 100%; background: #212121; border: 1px solid #2e2e2e; color: #fff;
        padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
        cursor: pointer; font-family: "Space Grotesk", sans-serif; font-size: 15px; font-weight: 600;
        text-align: left; transition: all 0.2s; gap: 12px; border-radius: 12px; margin-bottom: 4px;

      .cat-body { display: none; padding: 8px 0 16px 0; }
      .cat-body.show { display: block; }

      input[type="text"], input[type="number"], select, textarea {
        width: 100%; background: #181818; border: 1px solid #2e2e2e; color: #e2e0f0;
        font-family: "Ubuntu Mono", monospace; font-size: 13px; padding: 10px 14px;
        border-radius: 10px; outline: none; transition: border-color 0.2s; box-sizing: border-box;
      }
      input:focus, select:focus, textarea:focus { border-color: #555; }
      input::placeholder, textarea::placeholder { color: #555; }
      textarea { resize: vertical; min-height: 80px; }

      .btn-exec {
        background: #fff; color: #181818; border: none; padding: 10px 24px;
        font-family: "Space Grotesk", sans-serif; font-size: 13px; font-weight: 600;
        letter-spacing: 0.3px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
        display: inline-flex; align-items: center; gap: 8px;

      .btn-exec:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

      .code-block {
        background: #111; border: 1px solid #2e2e2e; border-radius: 10px;
        padding: 16px; font-family: "Ubuntu Mono", monospace; font-size: 12px;
        color: #e2e0f0; overflow-x: auto; white-space: pre-wrap; word-break: break-all;
        max-height: 500px; overflow-y: auto; line-height: 1.8;
      }
      .code-block img, .code-block video, .code-block audio { max-width: 100%; border-radius: 6px; display: block; }

      .section-label {
        font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #888;
        margin-bottom: 12px; font-family: "Ubuntu Mono", monospace; font-weight: 500;
        display: flex; align-items: center; gap: 8px;

      .section-label i { font-size: 16px; }
      .param-group { margin-bottom: 14px; }
      .param-label { font-size: 13px; color: #ccc; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; font-weight: 500; }
      .req-star { color: #f87171; font-size: 14px; }
      .param-desc { font-size: 11px; color: #666; margin-top: 5px; }
      .chevron { transition: transform 0.25s; }
      .chevron.open { transform: rotate(180deg); }

      .status-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .status-table th { text-align: left; padding: 10px 16px; border-bottom: 1px solid #2e2e2e; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; font-family: "Ubuntu Mono", monospace; }
      .status-table td { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
      .status-table td:first-child { font-family: "Ubuntu Mono", monospace; }
      .status-table tr:last-child td { border-bottom: none; }
      .status-table tr:hover td { background: rgba(255,255,255,0.02); }
      .sc-200 { color: #4ade80; }
      .sc-err { color: #f87171; }
      .sc-warn { color: #facc15; }

      .ep-link { font-family: "Ubuntu Mono", monospace; font-size: 13px; color: #bbb; word-break: break-all; }
      .ep-summary { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 2px; }

      .copy-btn {
        background: transparent; border: 1px solid #2e2e2e; color: #999; padding: 8px 16px;
        font-family: "Space Grotesk", sans-serif; font-size: 11px; cursor: pointer;
        border-radius: 8px; transition: all 0.2s; letter-spacing: 0.3px;
      }
      .copy-btn:hover { color: #fff; border-color: #555; }

      .flex-row-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .mb-16 { margin-bottom: 16px; }
    </style>

    <script>
      (function () {
        const sidebarToggle = document.getElementById("sidebarToggle");
        const sidebarClose = document.getElementById("sidebarClose");
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        function openSidebar() {
          sidebar.classList.add("open");
          overlay.classList.add("show");
          document.body.classList.add("overflow-hidden");
        }
        function closeSidebar() {
          if (window.innerWidth < 768) {
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
            document.body.classList.remove("overflow-hidden");
          }
        }
        sidebarToggle.addEventListener("click", openSidebar);
        sidebarClose.addEventListener("click", closeSidebar);
        overlay.addEventListener("click", closeSidebar);

        async function copyText(text, btn) {
          const orig = btn.innerHTML;
          try {
            await navigator.clipboard.writeText(text);
            btn.innerHTML = '<i class="material-icons text-sm">check</i> Copied';
          } catch (e) {
            btn.innerHTML = "Failed";
          }
          setTimeout(() => { btn.innerHTML = orig; }, 2000);
        }

        const _epStore = {};

        function methodClass(m) {
          return { GET: "method-get", POST: "method-post", PUT: "method-put", DELETE: "method-delete", PATCH: "method-patch" }[m] || "method-get";
        }

        function buildFormFields(item) {
          let html = "";
          if (item.parameters && item.parameters.length > 0) {
            item.parameters.forEach((param) => {
              const s = param.schema || {};
              const req = !!param.required;
              const lbl = `${param.name}${req ? ' <span class="req-star">*</span>' : ""}`;
              const desc = param.description ? `<div class="param-desc">${param.description}</div>` : "";
              const ph = (s.example ?? s.default ?? "") + "";
              if (Array.isArray(s.enum) && s.enum.length) {
                html += `<div class="param-group"><label class="param-label">${lbl}</label><select name="${param.name}"${req ? " required" : ""}>${s.enum.map((v) => `<option value="${v}">${v}</option>`).join("")}</select>${desc}</div>`;
              } else if (s.type === "boolean") {
                html += `<div class="param-group"><label class="param-label">${lbl}</label><select name="${param.name}"${req ? " required" : ""}><option value="true">true</option><option value="false">false</option></select>${desc}</div>`;
              } else if (s.type === "number" || s.type === "integer") {
                html += `<div class="param-group"><label class="param-label">${lbl}</label><input type="number" name="${param.name}" placeholder="${ph}"${req ? " required" : ""}>${desc}</div>`;
              } else {
                html += `<div class="param-group"><label class="param-label">${lbl}</label><input type="text" name="${param.name}" placeholder="${ph.replace(/"/g, "&quot;")}"${req ? " required" : ""}>${desc}</div>`;
              }
            });
          }
          return html;
        }

        function buildDetailHTML(ci, ei, item) {
          const formFields = buildFormFields(item);
          return `
            <div class="detail-block">
              <div class="section-label"><i class="material-icons">play_arrow</i> TRY IT OUT</div>
              <p class="text-sm text-gray-400 mb-4">${item.description || item.summary || "No description."}</p>
              ${formFields ? `
                <div class="section-label" style="margin-top:16px;"><i class="material-icons">tune</i> Parameters</div>
                ${formFields}
              ` : '<p class="text-sm text-gray-600 mb-4">No parameters needed.</p>'}
              <div class="flex-row-btns">
                <button class="btn-exec" id="exec-btn-${ci}-${ei}" onclick="window._kyoto.executeRequest(${ci},${ei},'${item.method}','${item.path}')"><i class="material-icons text-base">play_arrow</i> Execute</button>
              </div>
              <div id="resp-wrap-${ci}-${ei}" style="display:none;margin-top:16px;">
                <div class="section-label"><i class="material-icons">link</i> Request URL</div>
                <div class="flex-row-btns mb-16">
                  <div class="code-block" style="flex:1;margin:0;" id="resp-url-${ci}-${ei}"></div>
                  <button class="copy-btn" onclick="window._kyoto.copyText(document.getElementById('resp-url-${ci}-${ei}').textContent, this)"><i class="material-icons text-sm">content_copy</i> Copy</button>
                </div>
                <div class="section-label"><i class="material-icons">terminal</i> cURL Command</div>
                <div class="flex-row-btns mb-16">
                  <div class="code-block" style="flex:1;margin:0;" id="resp-curl-${ci}-${ei}"></div>
                  <button class="copy-btn" onclick="window._kyoto.copyText(document.getElementById('resp-curl-${ci}-${ei}').textContent, this)"><i class="material-icons text-sm">content_copy</i> Copy</button>
                </div>
                <div class="section-label"><i class="material-icons">data_object</i> Response</div>
                <div class="code-block" id="resp-body-${ci}-${ei}"></div>
              </div>
            </div>
            <div class="detail-block">
              <div class="section-label" style="margin-bottom:16px;"><i class="material-icons">list</i> HTTP STATUS CODES</div>
              <table class="status-table">
                <thead><tr><th>Code</th><th>Description</th></tr></thead>
                <tbody>
                  <tr><td class="sc-200"><i class="material-icons text-sm">check_circle</i> 200</td><td>OK — Request successful</td></tr>
                  <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 400</td><td>Bad Request — Invalid parameters or missing required fields</td></tr>
                  <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 405</td><td>Method Not Allowed — HTTP method not supported</td></tr>
                  <tr><td class="sc-warn"><i class="material-icons text-sm">warning</i> 429</td><td>Too Many Requests — Rate limit exceeded</td></tr>
                  <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 500</td><td>Internal Server Error — Server encountered an error</td></tr>
                </tbody>
              </table>
            </div>`;
        }

        async function executeRequest(ci, ei, method, path) {
          const form = document.getElementById(`form-${ci}-${ei}`);
          const respWrap = document.getElementById(`resp-wrap-${ci}-${ei}`);
          const execBtn = document.getElementById(`exec-btn-${ci}-${ei}`);
          const urlDiv = document.getElementById(`resp-url-${ci}-${ei}`);
          const curlDiv = document.getElementById(`resp-curl-${ci}-${ei}`);
          const bodyDiv = document.getElementById(`resp-body-${ci}-${ei}`);

          let fullPath = path;
          let curlCmd = `curl -X ${method} "${window.location.origin}${path}"`;
          let fetchOpts = {};
          const formData = form ? new FormData(form) : new FormData();

          if (["POST", "PUT", "PATCH"].includes(method)) {
            const rawJson = formData.get("__raw_json__");
            if (rawJson && rawJson.trim()) {
              fetchOpts = { method, headers: { "Content-Type": "application/json" }, body: rawJson.trim() };
              curlCmd += ` -H "Content-Type: application/json" -d '${rawJson.trim()}'`;
            } else {
              fetchOpts = { method, body: formData };
              for (const [k, v] of formData.entries()) {
                curlCmd += v instanceof File && v.name ? ` -F "${k}=@${v.name}"` : ` -F "${k}=${v}"`;
              }
            }
          } else {
            const params = new URLSearchParams();
            for (const [k, v] of formData.entries()) {
              if (typeof v === "string" && v) params.append(k, v);
            }
            const qs = params.toString();
            if (qs) fullPath += (path.includes("?") ? "&" : "?") + qs;
            curlCmd = `curl -X ${method} "${window.location.origin}${fullPath}"`;
          }

          respWrap.style.display = "block";
          urlDiv.textContent = `${window.location.origin}${fullPath}`;
          curlDiv.textContent = curlCmd;
          bodyDiv.innerHTML = '<span style="color:#666;font-size:13px;">Loading...</span>';
          execBtn.disabled = true;

          try {
            const opts = ["POST", "PUT", "PATCH"].includes(method) ? fetchOpts : {};
            const res = await fetch(fullPath, opts);
            const ct = res.headers.get("content-type") || "";
            if (!res.ok) {
              const t = await res.text().catch(() => "");
              throw new Error(`${res.status} ${res.statusText}\n${t}`);
            }
            if (ct.includes("application/json")) {
              const data = await res.json();
              bodyDiv.textContent = JSON.stringify(data, null, 2);
            } else if (ct.startsWith("image/")) {
              const blob = await res.blob();
              const url = URL.createObjectURL(blob);
              bodyDiv.innerHTML = `<img src="${url}" alt="Response Image"><div style="margin-top:12px;"><a href="${url}" download="response.${ct.split("/")[1] || "png"}" style="color:#60a5fa;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;"><i class="material-icons text-sm">download</i> Download Image</a></div>`;
            } else if (ct.startsWith("video/")) {
              const blob = await res.blob();
              const url = URL.createObjectURL(blob);
              bodyDiv.innerHTML = `<video controls src="${url}" style="max-width:100%;border-radius:6px;"></video><div style="margin-top:12px;"><a href="${url}" download="response.${ct.split("/")[1] || "mp4"}" style="color:#60a5fa;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;"><i class="material-icons text-sm">download</i> Download Video</a></div>`;
            } else if (ct.startsWith("audio/")) {
              const blob = await res.blob();
              const url = URL.createObjectURL(blob);
              bodyDiv.innerHTML = `<audio controls src="${url}" style="width:100%;"></audio><div style="margin-top:12px;"><a href="${url}" download="response.${ct.split("/")[1] || "mp3"}" style="color:#60a5fa;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;"><i class="material-icons text-sm">download</i> Download Audio</a></div>`;
            } else {
              bodyDiv.textContent = await res.text();
            }
          } catch (err) {
            bodyDiv.innerHTML = `<span style="color:#f87171;">${err.message}</span>`;
          }
          execBtn.disabled = false;
        }

        function toggleCategory(ci) {
          const body = document.getElementById(`cat-body-${ci}`);
          const chev = document.getElementById(`cat-chev-${ci}`);
          body.classList.toggle("show");
          chev.classList.toggle("open");
        }

        function toggleEndpoint(ci, ei) {
          const panel = document.getElementById(`ep-detail-${ci}-${ei}`);
          const chev = document.getElementById(`ep-chev-${ci}-${ei}`);
          const itemEl = document.getElementById(`ep-item-${ci}-${ei}`);
          if (!panel.dataset.rendered) {
            const item = _epStore[`${ci}-${ei}`];
            if (item) {
              panel.innerHTML = buildDetailHTML(ci, ei, item);
              const formEl = document.createElement("form");
              formEl.id = `form-${ci}-${ei}`;
              formEl.style.display = "none";
              formEl.innerHTML = buildFormFields(item);
              panel.appendChild(formEl);
            }
            panel.dataset.rendered = "1";
          }
          const isOpen = panel.classList.contains("open");
          document.querySelectorAll(".ep-detail-panel.open").forEach((p) => { if (p !== panel) p.classList.remove("open"); });
          document.querySelectorAll(".ep-item.active").forEach((el) => { if (el !== itemEl) el.classList.remove("active"); });
          document.querySelectorAll(".chevron.open").forEach((c) => { if (c !== chev) c.classList.remove("open"); });
          if (!isOpen) {
            panel.classList.add("open");
            chev.classList.add("open");
            itemEl.classList.add("active");
          } else {
            panel.classList.remove("open");
            chev.classList.remove("open");
            itemEl.classList.remove("active");
          }
        }

        async function loadContent() {
          const content = document.getElementById("content");
          const sideList = document.getElementById("sidebar-dynamic-list");
          const breadcrumb = document.getElementById("breadcrumb");
          const sidebarCatLink = document.getElementById("sidebar-category-link");
          const pathname = window.location.pathname;
          const categoryMatch = pathname.match(/^\/category\/(.+)$/);

          try {
            const res = await fetch("/src/openapi.json");
            if (!res.ok) throw new Error("Failed to fetch");
            const data = await res.json();

            const categories = {};
            if (data.tags) data.tags.forEach((t) => { categories[t.name] = { name: t.name, count: 0, endpoints: [] }; });
            Object.keys(data.paths || {}).forEach((p) => {
              const pi = data.paths[p];
              Object.keys(pi).forEach((method) => {
                const ep = pi[method];
                if (!ep) return;
                const tag = ep.tags?.[0] || "Other";
                if (!categories[tag]) categories[tag] = { name: tag, count: 0, endpoints: [] };
                categories[tag].count++;
                categories[tag].endpoints.push({
                  path: p,
                  method: method.toUpperCase(),
                  summary: ep.summary || "No description",
                  description: ep.description || "",
                  parameters: ep.parameters || [],
                  requestBody: ep.requestBody || null,
                  deprecated: !!ep.deprecated,
                });
              });
            });

            const cats = Object.values(categories).filter((c) => c.count > 0);
            const toSlug = (name) => name.toLowerCase().replace(/\s+/g, "-");

            sideList.innerHTML = cats
              .map((cat) => {
                const slug = toSlug(cat.name);
                const isActive = categoryMatch && categoryMatch[1] === slug;
                return `<a href="/category/${slug}" class="flex items-center justify-between py-1 px-4 text-sm rounded-xl ${isActive ? "text-white bg-[#222]" : "text-gray-400 hover:text-white hover:bg-[#222]"}"><span>${cat.name}</span><i class="material-icons text-lg ml-3">keyboard_arrow_right</i></a>`;
              })
              .join("");

            if (!categoryMatch) {
              sidebarCatLink.classList.add("text-white", "bg-[#222]");
            } else {
              sidebarCatLink.classList.remove("text-white", "bg-[#222]");
              sidebarCatLink.classList.add("text-gray-400", "hover:text-white", "hover:bg-[#222]");
            }

            if (categoryMatch) {
              const slug = categoryMatch[1];
              const category = cats.find((c) => toSlug(c.name) === slug);
              if (category) {
                breadcrumb.classList.remove("hidden");
                document.title = `${category.name} - Category.`;
                let html = `<div class="fade-in"><h2 class="text-2xl font-bold text-white mb-1">${category.name}</h2><p class="text-sm text-gray-400 mb-6">${category.count} endpoint${category.count !== 1 ? "s" : ""}</p>`;
                category.endpoints.forEach((ep, ei) => {
                  const ci = cats.indexOf(category);
                  _epStore[`${ci}-${ei}`] = ep;
                  html += `
                    <div class="ep-item" id="ep-item-${ci}-${ei}" data-path="${ep.path}" data-summary="${ep.summary}">
                      <button class="ep-toggle-btn" onclick="window._kyoto.toggleEndpoint(${ci},${ei})">
                        <div class="flex-1 min-w-0">
                          <div class="flex items-center gap-3 mb-1 flex-wrap">
                            <span class="method-badge ${methodClass(ep.method)}">${ep.method}</span>
                            <span class="ep-link">${ep.path}</span>
                          </div>
                          <div class="ep-summary">${ep.summary}</div>
                        </div>
                        <i class="material-icons chevron text-gray-500 flex-shrink-0" id="ep-chev-${ci}-${ei}">expand_more</i>
                      </button>
                      <div class="ep-detail-panel" id="ep-detail-${ci}-${ei}"></div>
                    </div>`;
                });
                html += "</div>";
                content.innerHTML = html;
              } else {
                breadcrumb.classList.remove("hidden");
                document.title = "Category Not Found.";
                content.innerHTML = `<div class="fade-in text-center py-12"><i class="material-icons text-5xl text-gray-600 mb-4">folder_off</i><h2 class="text-xl font-semibold text-white mb-2">Category Not Found</h2><a href="/category" class="inline-flex items-center gap-2 px-4 py-2 bg-[#2a2a2a] text-white rounded-lg hover:bg-[#333] transition-colors text-sm"><i class="material-icons text-base">arrow_back</i>Back</a></div>`;
              }
            } else {
              breadcrumb.classList.add("hidden");
              document.title = "Category.";
              content.innerHTML = cats
                .map((cat, i) => {
                  const slug = toSlug(cat.name);
                  return `<a href="/category/${slug}" class="block bg-[#212121] border border-[#2e2e2e] rounded-xl p-6 hover:border-[#383838] group fade-in transition-all" style="animation-delay:${i * 100}ms"><div class="flex items-center justify-between"><div class="flex-1"><div class="flex items-center gap-3 mb-2"><h4 class="text-lg font-semibold text-white">${cat.name}</h4><span class="px-2 py-1 bg-[#2a2a2a] text-gray-400 text-xs font-medium rounded">${cat.count} endpoint${cat.count !== 1 ? "s" : ""}</span></div><p class="text-sm text-gray-400">Explore ${cat.name} related endpoints.</p></div><div class="ml-4"><span class="material-icons text-gray-500 group-hover:text-white transition-colors">arrow_forward</span></div></div></a>`;
                })
                .join("");
            }
          } catch (err) {
            content.innerHTML = '<p class="text-red-400 text-sm text-center py-8">Failed to load data.</p>';
          }
        }

        document.getElementById("searchInput").addEventListener("input", function () {
          const q = this.value.toLowerCase();
          document.querySelectorAll(".ep-item").forEach((el) => {
            el.style.display = el.dataset.path.toLowerCase().includes(q) || el.dataset.summary.toLowerCase().includes(q) ? "" : "none";
          });
          document.querySelectorAll(".cat-body").forEach((b) => { b.style.display = "none"; b.classList.remove("show"); });
          document.querySelectorAll(".chevron").forEach((c) => c.classList.remove("open"));
          if (!q) {
            document.querySelectorAll(".cat-body.show").forEach((b) => (b.style.display = "block"));
            document.querySelectorAll(".chevron.open").forEach((c) => c.classList.add("open"));
          } else {
            document.querySelectorAll(".cat-body").forEach((b) => (b.style.display = "block"));
            document.querySelectorAll(".cat-toggle-btn .chevron").forEach((c) => c.classList.add("open"));
            document.querySelectorAll(".cat-group").forEach((g) => {
              g.style.display = [...g.querySelectorAll(".ep-item")].some((e) => e.style.display !== "none") ? "" : "none";
            });
          }
        });

        window.addEventListener("popstate", loadContent);
        document.addEventListener("click", function (e) {
          const link = e.target.closest("a");
          if (link && link.href && link.href.startsWith(window.location.origin + "/category")) {
            e.preventDefault();
            window.history.pushState({}, "", new URL(link.href).pathname);
            loadContent();
            closeSidebar();
          }
        });

        window._kyoto = { executeRequest, copyText, toggleEndpoint, toggleCategory };
        document.addEventListener("DOMContentLoaded", loadContent);
      })();
    </script>
  </body>
</html>
