<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category — Kyoto API.</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ["Ubuntu Mono", "monospace"],
            sans: ["Space Grotesk", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    ::-webkit-scrollbar { display: none !important; }
    
    body {
      background-color: #181818;
      letter-spacing: 0.025em;
    }
    
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image:
        linear-gradient(rgba(148,163,184,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 3000px; }
    }
    
    .animate-fade-in-up {
      animation: fadeInUp 0.4s ease-out forwards;
      opacity: 0;
    }
    
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    #sidebar {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    #overlay {
      transition: opacity 0.3s, visibility 0.3s;
    }
    
    #overlay.show {
      opacity: 1 !important;
      visibility: visible !important;
    }
    
    @media (max-width: 767px) {
      #sidebar {
        transform: translateX(-100%);
      }
      #sidebar.open {
        transform: translateX(0);
      }
    }
    
    @media (min-width: 768px) {
      body {
        padding-left: 16rem;
      }
      #sidebar {
        transform: translateX(0) !important;
      }
      #overlay {
        display: none !important;
      }
      #sidebarToggle,
      #sidebarClose {
        display: none !important;
      }
    }

    .cat-header-card {
      background: linear-gradient(135deg, #1e1e1e 0%, #1a1a1a 100%);
      border: 1px solid #2e2e2e;
    }

    .method-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: "Ubuntu Mono", monospace;
      flex-shrink: 0;
    }
    
    .method-get {
      background: rgba(59,130,246,0.12);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.25);
    }

    .ep-toggle-btn {
      width: 100%;
      background: #212121;
      border: 1px solid #2e2e2e;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
      text-align: left;
      transition: all 0.2s;
      gap: 12px;
      border-radius: 12px;
    }
    
    .ep-item {
      margin-bottom: 4px;
    }
    
    .ep-item.active .ep-toggle-btn {
      border-radius: 12px 12px 0 0;
      border-bottom: 1px solid #2e2e2e;
      background: #1a1a1a;
      border-color: #383838;
    }
    
    .ep-toggle-btn:hover {
      background: #1c1c1c;
      border-color: #383838;
    }

    .ep-detail-panel {
      background: #141414;
      border: 1px solid #2e2e2e;
      border-top: none;
      border-radius: 0 0 12px 12px;
      display: none;
      overflow: hidden;
    }
    
    .ep-detail-panel.open {
      display: block;
      animation: slideDown 0.3s ease-out;
    }
    
    .detail-block {
      padding: 20px 24px;
      border-bottom: 1px solid #2e2e2e;
    }
    
    .detail-block:last-child {
      border-bottom: none;
    }

    .stat-mini {
      background: #212121;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 14px 18px;
      text-align: center;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      background: #181818;
      border: 1px solid #2e2e2e;
      color: #e2e0f0;
      font-family: "Ubuntu Mono", monospace;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    
    input:focus,
    select:focus,
    textarea:focus {
      border-color: #555;
    }
    
    input::placeholder,
    textarea::placeholder {
      color: #555;
    }
    
    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn-exec {
      background: #fff;
      color: #181818;
      border: none;
      padding: 10px 24px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-exec:hover {
      background: #e0e0e0;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    
    .btn-exec:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .code-block {
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 12px 16px;
      font-family: "Ubuntu Mono", monospace;
      font-size: 12px;
      color: #e2e0f0;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 500px;
      overflow-y: auto;
      line-height: 1.8;
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #888;
      margin-bottom: 12px;
      font-family: "Ubuntu Mono", monospace;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section-label i {
      font-size: 16px;
    }

    .chevron {
      transition: transform 0.25s;
    }
    
    .chevron.open {
      transform: rotate(180deg);
    }

    .copy-btn {
      background: transparent;
      border: 1px solid #2e2e2e;
      color: #999;
      padding: 8px 14px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 11px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    
    .copy-btn:hover {
      color: #fff;
      border-color: #555;
    }

    .cat-grid-card {
      background: #212121;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      padding: 24px;
      transition: all 0.25s;
      cursor: pointer;
      display: block;
      text-decoration: none;
    }
    
    .cat-grid-card:hover {
      border-color: #444;
      background: #1c1c1c;
      transform: translateY(-2px);
    }

    /* Status table */
    .status-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    .status-table th {
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid #2e2e2e;
      color: #888;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
      font-family: "Ubuntu Mono", monospace;
    }
    
    .status-table td {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    
    .status-table td:first-child {
      font-family: "Ubuntu Mono", monospace;
    }
    
    .status-table tr:last-child td {
      border-bottom: none;
    }
    
    .sc-200 { color: #4ade80; }
    .sc-err { color: #f87171; }
    .sc-warn { color: #facc15; }

    /* URL bar style (compact, copy di kanan) */
    .url-bar {
      background: #111;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: "Ubuntu Mono", monospace;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .url-bar span {
      color: #e2e0f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    /* Response media */
    .response-media {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      display: block;
    }
    
    .response-media.audio {
      width: 100%;
      max-height: 60px;
    }
  </style>
</head>

      <div class="mb-6 px-4">

<script>
(function() {
  // ===== SIDEBAR LOGIC =====
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  
  function openSb() {
    sidebar.classList.add("open");
    overlay.classList.add("show");
    document.body.style.overflow = "hidden";
  }
  
  function closeSb() {
    if (window.innerWidth < 768) {
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
      document.body.style.overflow = "";
    }
  }
  
  document.getElementById("sidebarToggle").addEventListener("click", openSb);
  document.getElementById("sidebarClose").addEventListener("click", closeSb);
  overlay.addEventListener("click", closeSb);

  // ===== GLOBAL ENDPOINT STORE =====
  const EP = {};

  // ===== BUILD PARAMETER INPUTS =====
  function buildParams(params) {
    if (!params?.length) return '<p class="text-sm text-gray-600">No parameters required.</p>';
    return params.map(p => {
      const s = p.schema || {};
      const req = !!p.required;
      const ph = (s.example ?? s.default ?? '') + '';
      let input = '';
      if (s.enum) {
        input = `<select name="${p.name}">${s.enum.map(v => `<option value="${v}">${v}</option>`).join('')}</select>`;
      } else if (s.type === 'number' || s.type === 'integer') {
        input = `<input type="number" name="${p.name}" placeholder="${ph}" />`;
      } else {
        input = `<input type="text" name="${p.name}" placeholder="${ph.replace(/"/g, '&quot;')}" />`;
      }
      return `
        <div class="mb-4">
          <label class="flex items-center gap-2 text-sm text-gray-300 mb-2 font-medium">
            ${p.name}
            ${req ? '<span class="text-red-400 text-xs">*required</span>' : '<span class="text-gray-600 text-xs">optional</span>'}
          </label>
          ${input}
          ${p.description ? `<p class="text-xs text-gray-600 mt-1">${p.description}</p>` : ''}
        </div>`;
    }).join('');
  }

  // ===== DETECT & RENDER RESPONSE =====
  function renderResponse(bodyDiv, data, contentType, responseUrl) {
    // Jika response adalah object dengan URL (seperti DiceBear, Pollinations, dll)
    if (data && typeof data === 'object') {
      // Cek berbagai kemungkinan key URL
      const urlKeys = ['url', 'image', 'qr', 'barcode', 'audio_url', 'screenshot', 'png', 'svg', 'result'];
      let foundUrl = null;
      
      for (const key of urlKeys) {
        if (data[key] && typeof data[key] === 'string' && data[key].startsWith('http')) {
          foundUrl = data[key];
          break;
        }
      }
      
      if (foundUrl) {
        const ext = foundUrl.split('.').pop().split('?')[0].toLowerCase();
        const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp', 'ico'];
        const videoExts = ['mp4', 'webm', 'ogg', 'mov'];
        const audioExts = ['mp3', 'wav', 'ogg', 'flac', 'aac', 'm4a'];
        
        if (imageExts.includes(ext) || foundUrl.includes('image') || foundUrl.includes('pollinations')) {
          bodyDiv.innerHTML = `
            <div class="mb-3">
              <img src="${foundUrl}" alt="Response Image" class="response-media" onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
              <p class="text-xs text-gray-600 mt-2 hidden">Image failed to load. <a href="${foundUrl}" target="_blank" class="text-blue-400 hover:underline">Open directly</a></p>
            </div>
            <a href="${foundUrl}" download class="inline-flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors">
              <i class="material-icons text-sm">download</i> Download Image
            </a>`;
        } else if (videoExts.includes(ext) || foundUrl.includes('video')) {
          bodyDiv.innerHTML = `
            <video controls class="response-media mb-2" style="max-height:300px;">
              <source src="${foundUrl}" type="video/${ext}">
              Your browser does not support the video tag.
            </video>
            <a href="${foundUrl}" download class="inline-flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors">
              <i class="material-icons text-sm">download</i> Download Video
            </a>`;
        } else if (audioExts.includes(ext) || foundUrl.includes('audio') || foundUrl.includes('speech')) {
          bodyDiv.innerHTML = `
            <audio controls class="response-media audio mb-2">
              <source src="${foundUrl}" type="audio/${ext}">
              Your browser does not support the audio tag.
            </audio>
            <a href="${foundUrl}" download class="inline-flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors">
              <i class="material-icons text-sm">download</i> Download Audio
            </a>`;
        } else {
          // URL yang perlu dibuka
          bodyDiv.innerHTML = `
            <p class="text-sm text-gray-300 mb-2">Response contains URL:</p>
            <a href="${foundUrl}" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm break-all inline-flex items-center gap-1">
              <i class="material-icons text-sm">open_in_new</i> ${foundUrl}
            </a>`;
        }
        return;
      }
    }
    
    // Default: tampilkan JSON
    bodyDiv.textContent = JSON.stringify(data, null, 2);
  }

  // ===== EXECUTE ENDPOINT =====
  async function exec(ci, ei) {
    const item = EP[`${ci}-${ei}`];
    const panel = document.getElementById(`ep-detail-${ci}-${ei}`);
    const uDiv = document.getElementById(`resp-url-text-${ci}-${ei}`);
    const cDiv = document.getElementById(`resp-curl-text-${ci}-${ei}`);
    const bDiv = document.getElementById(`resp-body-${ci}-${ei}`);
    const btn = document.getElementById(`exec-btn-${ci}-${ei}`);
    const wrap = document.getElementById(`resp-wrap-${ci}-${ei}`);

    let fp = item.path;
    const pr = new URLSearchParams();
    panel.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.name && el.value) pr.append(el.name, el.value);
    });
    const qs = pr.toString();
    if (qs) fp += (item.path.includes('?') ? '&' : '?') + qs;
    const fullUrl = location.origin + fp;
    const curl = `curl -X GET "${fullUrl}"`;

    wrap.style.display = 'block';
    uDiv.textContent = fullUrl;
    cDiv.textContent = curl;
    bDiv.innerHTML = '<span style="color:#666">Loading...</span>';
    btn.disabled = true;

    try {
      const r = await fetch(fp);
      const ct = r.headers.get('content-type') || '';
      
      if (!r.ok) {
        const t = await r.text().catch(() => '');
        throw new Error(r.status + ' ' + r.statusText + '\n' + t.slice(0, 500));
      }
      
      if (ct.includes('json')) {
        const data = await r.json();
        renderResponse(bDiv, data, ct, fullUrl);
      } else if (ct.startsWith('image/')) {
        const blob = await r.blob();
        const blobUrl = URL.createObjectURL(blob);
        bDiv.innerHTML = `
          <img src="${blobUrl}" alt="Response" class="response-media" />
          <a href="${blobUrl}" download class="inline-flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors mt-2">
            <i class="material-icons text-sm">download</i> Download
          </a>`;
      } else if (ct.startsWith('video/')) {
        const blob = await r.blob();
        const blobUrl = URL.createObjectURL(blob);
        bDiv.innerHTML = `
          <video controls class="response-media mb-2">
            <source src="${blobUrl}" type="${ct}">
          </video>
          <a href="${blobUrl}" download class="inline-flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors">
            <i class="material-icons text-sm">download</i> Download
          </a>`;
      } else if (ct.startsWith('audio/')) {
        const blob = await r.blob();
        const blobUrl = URL.createObjectURL(blob);
        bDiv.innerHTML = `
          <audio controls class="response-media audio mb-2">
            <source src="${blobUrl}" type="${ct}">
          </audio>
          <a href="${blobUrl}" download class="inline-flex items-center gap-1 text-xs text-blue-400 hover:text-blue-300 transition-colors">
            <i class="material-icons text-sm">download</i> Download
          </a>`;
      } else {
        bDiv.textContent = await r.text();
      }
    } catch (e) {
      bDiv.innerHTML = `<span style="color:#f87171">${e.message}</span>`;
    }
    btn.disabled = false;
  }

  // ===== COPY TO CLIPBOARD =====
  async function copyText(text, btn) {
    const originalHTML = btn.innerHTML;
    try {
      await navigator.clipboard.writeText(text);
      btn.innerHTML = '<i class="bi bi-check-lg"></i> Copied';
    } catch (e) {
      btn.innerHTML = 'Failed';
    }
    setTimeout(() => (btn.innerHTML = originalHTML), 2000);
  }

  // ===== TOGGLE ENDPOINT DETAIL =====
  function toggleEp(ci, ei) {
    const panel = document.getElementById(`ep-detail-${ci}-${ei}`);
    const chev = document.getElementById(`ep-chev-${ci}-${ei}`);
    const itemEl = document.getElementById(`ep-item-${ci}-${ei}`);

    if (!panel.dataset.rendered) {
      const item = EP[`${ci}-${ei}`];
      panel.innerHTML = `
        <div class="detail-block">
          <div class="section-label"><i class="material-icons">info</i> Description</div>
          <p class="text-sm text-gray-400 mb-6">${item.desc || item.summary || 'No description available.'}</p>
          
          <div class="section-label"><i class="material-icons">tune</i> Parameters</div>
          ${buildParams(item.params)}
          
          <button class="btn-exec" id="exec-btn-${ci}-${ei}" onclick="window._k.exec(${ci},${ei})">
            <i class="material-icons text-base">play_arrow</i> Execute
          </button>
          
          <div id="resp-wrap-${ci}-${ei}" style="display:none;margin-top:20px;">
            <div class="section-label"><i class="material-icons">link</i> Request URL</div>
            <div class="url-bar">
              <span id="resp-url-text-${ci}-${ei}"></span>
              <button class="copy-btn" onclick="window._k.copy(document.getElementById('resp-url-text-${ci}-${ei}').textContent, this)">
                <i class="bi bi-copy text-xs"></i> Copy
              </button>
            </div>
            
            <div class="section-label"><i class="material-icons">terminal</i> cURL</div>
            <div class="url-bar">
              <span id="resp-curl-text-${ci}-${ei}"></span>
              <button class="copy-btn" onclick="window._k.copy(document.getElementById('resp-curl-text-${ci}-${ei}').textContent, this)">
                <i class="bi bi-copy text-xs"></i> Copy
              </button>
            </div>
            
            <div class="section-label"><i class="material-icons">data_object</i> Response</div>
            <div class="code-block" id="resp-body-${ci}-${ei}"></div>
          </div>
        </div>
        
        <div class="detail-block">
          <div class="section-label"><i class="material-icons">list</i> HTTP Status Codes</div>
          <table class="status-table">
            <thead><tr><th>Code</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td class="sc-200"><i class="material-icons text-sm">check_circle</i> 200</td><td>OK — Request successful</td></tr>
              <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 400</td><td>Bad Request — Missing or invalid parameters</td></tr>
              <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 405</td><td>Method Not Allowed — Only GET is supported</td></tr>
              <tr><td class="sc-warn"><i class="material-icons text-sm">warning</i> 429</td><td>Too Many Requests — Rate limit exceeded</td></tr>
              <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 500</td><td>Internal Server Error — Upstream API failure</td></tr>
            </tbody>
          </table>
        </div>`;
      panel.dataset.rendered = '1';
    }
    
    panel.classList.toggle('open');
    chev.classList.toggle('open');
    itemEl.classList.toggle('active');
  }

  // ===== LOAD CATEGORIES & ENDPOINTS =====
  async function load() {
    const cont = document.getElementById('content');
    const sideList = document.getElementById('sidebar-category-list');
    const bc = document.getElementById('breadcrumb-current');
    const curCat = new URLSearchParams(location.search).get('cat');

    try {
      const r = await fetch('/src/openapi.json');
      const d = await r.json();
      
      const cats = {};
      d.tags?.forEach(t => { cats[t.name] = { name: t.name, desc: t.description || '', eps: [] }; });
      
      Object.keys(d.paths || {}).forEach(p => {
        Object.keys(d.paths[p]).forEach(method => {
          const ep = d.paths[p][method];
          const tag = ep.tags?.[0] || 'Other';
          if (!cats[tag]) cats[tag] = { name: tag, desc: '', eps: [] };
          cats[tag].eps.push({
            path: p,
            method: method.toUpperCase(),
            summary: ep.summary || '',
            desc: ep.description || '',
            params: ep.parameters || []
          });
        });
      });

      const cl = Object.values(cats).filter(c => c.eps.length);
      const slug = n => n.toLowerCase().replace(/\s+/g, '-');

      // Build sidebar
      sideList.innerHTML = cl.map(c => `
        <a href="/category?cat=${slug(c.name)}" 
           class="flex items-center justify-between py-2 px-4 text-sm rounded-xl transition-colors ${curCat === slug(c.name) ? 'text-white bg-[#222]' : 'text-gray-400 hover:text-white hover:bg-[#222]'}">
          <span>${c.name}</span>
          <span class="text-xs text-gray-600">${c.eps.length}</span>
        </a>
      `).join('');

      if (curCat) {
        const cat = cl.find(c => slug(c.name) === curCat);
        if (cat) {
          document.title = `${cat.name} — Kyoto API`;
          bc.textContent = cat.name;
          
          let h = `
            <div class="cat-header-card rounded-2xl p-8 mb-8 animate-fade-in-up" style="animation-delay:0ms">
              <div class="flex items-start justify-between flex-wrap gap-4">
                <div>
                  <h1 class="text-3xl font-bold text-white mb-2">${cat.name}</h1>
                  <p class="text-gray-400 text-sm max-w-xl">${cat.desc || 'Browse available endpoints in this category.'}</p>
                </div>
                <div class="flex gap-3">
                  <div class="stat-mini">
                    <div class="text-2xl font-bold text-white font-mono">${cat.eps.length}</div>
                    <div class="text-xs text-gray-500">Endpoints</div>
                  </div>
                </div>
              </div>
            </div>
          `;
          
          h += `<div class="space-y-1">`;
          cat.eps.forEach((ep, ei) => {
            const ci = cl.indexOf(cat);
            EP[`${ci}-${ei}`] = ep;
            h += `
              <div class="ep-item animate-fade-in-up" id="ep-item-${ci}-${ei}" style="animation-delay:${ei * 50}ms">
                <button class="ep-toggle-btn" onclick="window._k.toggleEp(${ci},${ei})">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-3 mb-1">
                      <span class="method-badge method-get">${ep.method}</span>
                      <span class="font-mono text-sm text-gray-300 truncate">${ep.path}</span>
                    </div>
                    <div class="text-sm font-semibold text-white">${ep.summary}</div>
                  </div>
                  <i class="material-icons chevron flex-shrink-0" id="ep-chev-${ci}-${ei}">expand_more</i>
                </button>
                <div class="ep-detail-panel" id="ep-detail-${ci}-${ei}"></div>
              </div>`;
          });
          h += `</div>`;
          
          cont.innerHTML = h;
        } else {
          cont.innerHTML = '<p class="text-red-400 text-sm text-center py-8">Category not found.</p>';
        }
      } else {
        document.title = 'Categories — Kyoto API';
        bc.textContent = 'All Categories';
        
        const icons = {
          'AI': 'fa-brain', 'Anime': 'fa-dragon', 'News': 'fa-newspaper',
          'Internet': 'fa-globe', 'Games': 'fa-gamepad', 'Info': 'fa-circle-info',
          'Maker': 'fa-wand-magic-sparkles', 'Stalker': 'fa-magnifying-glass',
          'Tools': 'fa-screwdriver-wrench', 'Media': 'fa-image'
        };
        
        let h = `
          <div class="mb-8 animate-fade-in-up">
            <h1 class="text-3xl font-bold text-white mb-2">API Categories</h1>
            <p class="text-gray-400 text-sm">Browse ${cl.reduce((sum, c) => sum + c.eps.length, 0)} endpoints across ${cl.length} categories.</p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
        
        cl.forEach((c, i) => {
          const icon = icons[c.name] || 'fa-code';
          h += `
            <a href="/category?cat=${slug(c.name)}" class="cat-grid-card animate-fade-in-up" style="animation-delay:${i * 50}ms">
              <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 rounded-xl bg-[#1a1a1a] border border-[#2e2e2e] flex items-center justify-center">
                  <i class="fas ${icon} text-gray-400"></i>
                </div>
                <span class="text-xs text-gray-600 font-mono">${c.eps.length} endpoints</span>
              </div>
              <h3 class="text-lg font-semibold text-white mb-1">${c.name}</h3>
              <p class="text-sm text-gray-500 line-clamp-2">${c.desc || 'No description'}</p>
              <div class="flex items-center gap-1 mt-3 text-xs text-gray-600">
                <span>Explore</span>
                <i class="material-icons text-sm">arrow_forward</i>
              </div>
            </a>`;
        });
        
        h += `</div>`;
        cont.innerHTML = h;
      }
    } catch (e) {
      cont.innerHTML = '<p class="text-red-400 text-sm text-center py-8">Failed to load API data. Please try again.</p>';
    }
  }

  // Search functionality removed

  // ===== SPA NAVIGATION =====
  window.addEventListener('popstate', load);
  document.addEventListener('click', function(e) {
    const l = e.target.closest('a');
    if (l && l.href && l.href.startsWith(location.origin + '/category')) {
      e.preventDefault();
      const u = new URL(l.href);
      history.pushState({}, '', u.pathname + (u.search || ''));
      load();
      if (window.innerWidth < 768) closeSb();
    }
  });

  // ===== EXPORT GLOBALS =====
  window._k = { exec, copy: copyText, toggleEp };
  
  // ===== INIT =====
  load();
})();
</script>

</body>
</html>
