<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category — Kyoto API.</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ["Ubuntu Mono", "monospace"],
            sans: ["Space Grotesk", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    body {
      background-color: #181818;
      letter-spacing: 0.025em;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      background-image:
        linear-gradient(rgba(148,163,184,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.4s ease-out forwards;
      opacity: 0;
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }

    /* Sidebar */
    #sidebar {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #overlay {
      transition: opacity 0.3s, visibility 0.3s;
    }
    #overlay.show {
      opacity: 1 !important;
      visibility: visible !important;
    }
    @media (max-width: 767px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
    }
    @media (min-width: 768px) {
      body { padding-left: 16rem; }
      #sidebar { transform: translateX(0) !important; }
      #overlay { display: none !important; }
      #sidebarToggle, #sidebarClose { display: none !important; }
    }

    /* Category header */
    .cat-header-card {
      background: linear-gradient(135deg, #1e1e1e 0%, #1a1a1a 100%);
      border: 1px solid #2e2e2e;
    }

    /* Method badge */
    .method-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: "Ubuntu Mono", monospace;
      flex-shrink: 0;
    }
    .method-get    { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .method-post   { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
    .method-put    { background: rgba(250,204,21,0.12); color: #facc15; border: 1px solid rgba(250,204,21,0.25); }
    .method-delete { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
    .method-patch  { background: rgba(168,85,247,0.12); color: #a855f7; border: 1px solid rgba(168,85,247,0.25); }

    /* Endpoint toggle */
    .ep-toggle-btn {
      width: 100%;
      background: #212121;
      border: 1px solid #2e2e2e;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
      text-align: left;
      transition: all 0.2s;
      gap: 12px;
      border-radius: 12px;
    }
    .ep-item { margin-bottom: 6px; }
    .ep-item.active .ep-toggle-btn {
      border-radius: 12px 12px 0 0;
      border-bottom: 1px solid #2a2a2a;
      background: #1c1c1c;
      border-color: #383838;
    }
    .ep-toggle-btn:hover {
      background: #1c1c1c;
      border-color: #3a3a3a;
    }
    .ep-detail-panel {
      background: #141414;
      border: 1px solid #2e2e2e;
      border-top: none;
      border-radius: 0 0 12px 12px;
      display: none;
      overflow: hidden;
    }
    .ep-detail-panel.open {
      display: block;
      animation: slideDown 0.25s ease-out;
    }
    .detail-block {
      padding: 20px 24px;
      border-bottom: 1px solid #222;
    }
    .detail-block:last-child { border-bottom: none; }

    /* Stats */
    .stat-mini {
      background: #212121;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 14px 18px;
      text-align: center;
    }

    /* Form inputs */
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      background: #181818;
      border: 1px solid #2e2e2e;
      color: #e2e0f0;
      font-family: "Ubuntu Mono", monospace;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #555;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.03);
    }
    input::placeholder, textarea::placeholder { color: #444; }
    textarea { resize: vertical; min-height: 80px; }

    /* Execute button */
    .btn-exec {
      background: #fff;
      color: #181818;
      border: none;
      padding: 10px 24px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-exec:hover {
      background: #e8e8e8;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
    .btn-exec:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .btn-exec .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #181818;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-exec.loading .spinner { display: inline-block; }
    .btn-exec.loading .exec-icon { display: none; }

    /* Code block */
    .code-block {
      background: #111;
      border: 1px solid #252525;
      border-radius: 10px;
      padding: 14px 16px;
      font-family: "Ubuntu Mono", monospace;
      font-size: 12px;
      color: #d4d0f0;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 500px;
      overflow-y: auto;
      line-height: 1.85;
    }

    /* Section label */
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #666;
      margin-bottom: 12px;
      font-family: "Ubuntu Mono", monospace;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label i { font-size: 15px; }

    /* Chevron */
    .chevron { transition: transform 0.25s; }
    .chevron.open { transform: rotate(180deg); }

    /* Copy button */
    .copy-btn {
      background: transparent;
      border: 1px solid #2e2e2e;
      color: #888;
      padding: 6px 12px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 11px;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .copy-btn:hover { color: #fff; border-color: #555; background: rgba(255,255,255,0.04); }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

    /* Category card */
    .cat-grid-card {
      background: #212121;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      padding: 24px;
      transition: all 0.25s;
      cursor: pointer;
      display: block;
      text-decoration: none;
    }
    .cat-grid-card:hover {
      border-color: #444;
      background: #1c1c1c;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    /* Status table */
    .status-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .status-table th {
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid #2e2e2e;
      color: #555;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
      font-family: "Ubuntu Mono", monospace;
    }
    .status-table td { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .status-table td:first-child { font-family: "Ubuntu Mono", monospace; }
    .status-table tr:last-child td { border-bottom: none; }
    .sc-200 { color: #4ade80; }
    .sc-err { color: #f87171; }
    .sc-warn { color: #facc15; }

    /* URL bar */
    .url-bar {
      background: #0f0f0f;
      border: 1px solid #252525;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: "Ubuntu Mono", monospace;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .url-bar span {
      color: #b0acd0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }

    /* Response media */
    .response-image-wrapper {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }
    .response-img {
      max-width: 100%;
      max-height: 480px;
      border-radius: 10px;
      display: block;
      cursor: zoom-in;
      transition: opacity 0.2s;
      border: 1px solid #2e2e2e;
      object-fit: contain;
    }
    .response-img:hover { opacity: 0.92; }
    .response-media-audio { width: 100%; border-radius: 8px; }
    .response-media-video { max-width: 100%; max-height: 360px; border-radius: 10px; border: 1px solid #2e2e2e; }

    /* Media action row */
    .media-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .btn-media-action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      border: 1px solid #2e2e2e;
      color: #999;
      background: transparent;
    }
    .btn-media-action:hover { color: #fff; border-color: #555; background: rgba(255,255,255,0.04); }
    .btn-media-action.primary { background: rgba(255,255,255,0.06); color: #e2e0f0; border-color: #3a3a3a; }
    .btn-media-action.primary:hover { background: rgba(255,255,255,0.1); border-color: #555; }

    /* URL response display */
    .url-response-card {
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
    }
    .url-response-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-family: "Ubuntu Mono", monospace;
      margin-bottom: 8px;
    }
    .url-response-link {
      color: #60a5fa;
      font-family: "Ubuntu Mono", monospace;
      font-size: 12px;
      word-break: break-all;
      text-decoration: none;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      line-height: 1.6;
      transition: color 0.2s;
    }
    .url-response-link:hover { color: #93c5fd; }
    .url-response-link i { flex-shrink: 0; font-size: 14px; margin-top: 2px; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #1e1e1e 25%, #262626 50%, #1e1e1e 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    /* Response status badge */
    .resp-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-family: "Ubuntu Mono", monospace;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .resp-status-badge.ok { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
    .resp-status-badge.err { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }

    /* Fullscreen lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      cursor: zoom-out;
    }
    #lightbox.show { display: flex; animation: fadeIn 0.2s; }
    #lightbox img {
      max-width: 92vw;
      max-height: 82vh;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    }
    #lightbox-close {
      position: fixed;
      top: 18px; right: 20px;
      color: #888;
      font-size: 28px;
      cursor: pointer;
      transition: color 0.2s;
      z-index: 10000;
    }
    #lightbox-close:hover { color: #fff; }
    #lightbox-actions {
      display: flex;
      gap: 12px;
    }

    /* JSON syntax highlight */
    .json-key { color: #7dd3fc; }
    .json-str { color: #86efac; }
    .json-num { color: #fbbf24; }
    .json-bool { color: #c4b5fd; }
    .json-null { color: #94a3b8; }

    /* Response container */
    .resp-container {
      position: relative;
    }
    .resp-container .copy-btn {
      position: absolute;
      top: 8px; right: 8px;
    }

    /* Tab for JSON / raw toggle */
    .resp-tab-bar {
      display: flex;
      gap: 2px;
      margin-bottom: 8px;
    }
    .resp-tab {
      padding: 5px 14px;
      font-size: 11px;
      font-family: "Ubuntu Mono", monospace;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 7px 7px 0 0;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }
    .resp-tab.active { background: #111; color: #e2e0f0; border-bottom-color: #111; }

    /* Expand/collapse JSON */
    details.json-object summary { cursor: pointer; }

    /* Notification toast */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #212121;
      border: 1px solid #383838;
      color: #e2e0f0;
      padding: 12px 18px;
      border-radius: 10px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      font-weight: 500;
      z-index: 9998;
      display: none;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      animation: fadeInUp 0.3s;
    }
    #toast.show { display: flex; }
    #toast.success i { color: #4ade80; }
    #toast.error i { color: #f87171; }

    /* Response time badge */
    .resp-time {
      font-size: 10px;
      font-family: "Ubuntu Mono", monospace;
      color: #555;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .resp-time.fast { color: #4ade80; }
    .resp-time.slow { color: #facc15; }
  </style>
</head>
<body class="bg-[#181818] text-gray-200 antialiased font-sans min-h-screen">

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox(event)">
    <button id="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('show')">
      <i class="material-icons">close</i>
    </button>
    <img id="lightbox-img" src="" alt="Preview" />
    <div id="lightbox-actions"></div>
  </div>

  <!-- Toast -->
  <div id="toast">
    <i class="material-icons text-base">check_circle</i>
    <span id="toast-msg"></span>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-[#181818] text-gray-200 border-r border-[#2e2e2e] z-[100] overflow-y-auto">
    <div class="px-6 py-6 flex items-center justify-between md:hidden border-b border-[#2e2e2e]">
      <span class="text-white font-bold text-base" style="font-family:'Space Grotesk',sans-serif;">
        Kyoto<span class="text-gray-500">API</span>
      </span>
      <button id="sidebarClose" class="text-gray-400 hover:text-white transition-colors">
        <i class="material-icons text-xl">close</i>
      </button>
    </div>
    <div class="px-5 pb-8 pt-0 md:pt-8">
      <div class="mb-6 px-4 hidden md:block">
        <a href="/" class="text-white font-bold text-lg" style="font-family:'Space Grotesk',sans-serif;">
          Kyoto<span class="text-gray-500">API</span>
        </a>
      </div>
      <nav>
        <p class="font-medium text-xs text-gray-500 mb-3 px-4 uppercase tracking-widest">Navigation</p>
        <div class="space-y-1 mb-6">
          <a href="/" class="flex items-center py-2 px-4 text-sm text-gray-400 hover:text-white hover:bg-[#222] rounded-xl transition-colors">
            <i class="material-icons text-base mr-3 opacity-70">home</i>Home
          </a>
          <a href="/category" class="flex items-center py-2 px-4 text-sm text-white bg-[#222] rounded-xl">
            <i class="material-icons text-base mr-3">explore</i>Categories
          </a>
          <a href="/status" class="flex items-center py-2 px-4 text-sm text-gray-400 hover:text-white hover:bg-[#222] rounded-xl transition-colors">
            <i class="material-icons text-base mr-3 opacity-70">monitor_heart</i>Status
          </a>
        </div>
        <p class="font-medium text-xs text-gray-500 mb-3 px-4 uppercase tracking-widest">Categories</p>
        <div class="space-y-0.5" id="sidebar-category-list">
          <!-- Skeleton loading -->
          <div class="space-y-2 px-4">
            <div class="skeleton h-8 w-full rounded-xl"></div>
            <div class="skeleton h-8 w-4/5 rounded-xl"></div>
            <div class="skeleton h-8 w-full rounded-xl"></div>
            <div class="skeleton h-8 w-3/4 rounded-xl"></div>
          </div>
        </div>
      </nav>
    </div>
  </aside>

  <div id="overlay" class="fixed inset-0 bg-black bg-opacity-70 opacity-0 invisible z-[90] md:hidden"></div>

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-[#181818]/95 backdrop-blur-sm border-b border-[#2e2e2e]">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <button id="sidebarToggle" class="text-gray-400 hover:text-white transition-colors md:hidden">
          <i class="material-icons text-2xl">menu</i>
        </button>
        <div class="hidden md:flex items-center gap-2 text-sm text-gray-500">
          <a href="/" class="hover:text-white transition-colors">Home</a>
          <span class="text-gray-700">/</span>
          <a href="/category" class="hover:text-white transition-colors">Categories</a>
          <span class="text-gray-700" id="breadcrumb-sep" style="display:none">/</span>
          <span class="text-white" id="breadcrumb-current"></span>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <!-- Response time indicator (shows after first exec) -->
        <div id="header-stats" class="hidden items-center gap-3 text-xs text-gray-600 font-mono">
          <span id="header-req-count">0 req</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-5xl mx-auto px-6 py-8">
    <div id="content">
      <!-- Skeleton -->
      <div class="space-y-4">
        <div class="skeleton h-36 rounded-2xl"></div>
        <div class="skeleton h-16 rounded-xl"></div>
        <div class="skeleton h-16 rounded-xl"></div>
        <div class="skeleton h-16 rounded-xl"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-[#2e2e2e] mt-16">
    <div class="max-w-5xl mx-auto px-6 py-8">
      <div class="flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-xs text-gray-600">&copy; 2026 Kyoto API. All rights reserved.</p>
        <div class="flex gap-5">
          <a href="/" class="text-xs text-gray-600 hover:text-white transition-colors">Home</a>
          <a href="/category" class="text-xs text-white transition-colors">Categories</a>
          <a href="/status" class="text-xs text-gray-600 hover:text-white transition-colors">Status</a>
        </div>
      </div>
    </div>
  </footer>

<script>
(function() {
  'use strict';

  // ===== TOAST =====
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    const m = document.getElementById('toast-msg');
    const icon = t.querySelector('i');
    t.className = 'show ' + type;
    icon.textContent = type === 'success' ? 'check_circle' : 'error';
    m.textContent = msg;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ===== LIGHTBOX =====
  function openLightbox(src, downloadFn) {
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightbox-img');
    const acts = document.getElementById('lightbox-actions');
    img.src = src;
    acts.innerHTML = `
      <button class="btn-media-action primary" onclick="${downloadFn}">
        <i class="material-icons text-base">download</i> Download
      </button>
      <button class="btn-media-action" onclick="document.getElementById('lightbox').classList.remove('show')">
        <i class="material-icons text-base">close</i> Close
      </button>`;
    lb.classList.add('show');
  }
  window.closeLightbox = function(e) {
    if (e.target === document.getElementById('lightbox')) {
      document.getElementById('lightbox').classList.remove('show');
    }
  };
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('show');
  });

  // ===== SIDEBAR =====
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  function openSb() { sidebar.classList.add("open"); overlay.classList.add("show"); document.body.style.overflow = "hidden"; }
  function closeSb() { if (window.innerWidth < 768) { sidebar.classList.remove("open"); overlay.classList.remove("show"); document.body.style.overflow = ""; } }
  document.getElementById("sidebarToggle").addEventListener("click", openSb);
  document.getElementById("sidebarClose").addEventListener("click", closeSb);
  overlay.addEventListener("click", closeSb);

  // ===== GLOBAL STATE =====
  const EP = {};
  let totalReqs = 0;

  // ===== COPY TO CLIPBOARD =====
  async function copyText(text, btn) {
    if (!text) return;
    const orig = btn.innerHTML;
    try {
      await navigator.clipboard.writeText(text);
      btn.innerHTML = '<i class="bi bi-check-lg"></i> Copied';
      btn.classList.add('copied');
      showToast('Copied to clipboard!');
    } catch (e) {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.innerHTML = '<i class="bi bi-check-lg"></i> Copied';
      btn.classList.add('copied');
      showToast('Copied!');
    }
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  }

  // ===== JSON SYNTAX HIGHLIGHTER =====
  function highlightJSON(obj) {
    const json = JSON.stringify(obj, null, 2);
    return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(?:\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
      let cls = 'json-num';
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? 'json-key' : 'json-str';
      } else if (/true|false/.test(match)) {
        cls = 'json-bool';
      } else if (/null/.test(match)) {
        cls = 'json-null';
      }
      return `<span class="${cls}">${match}</span>`;
    });
  }

  // ===== SMART URL DETECTOR =====
  // Deeply scan any value in a response for URLs
  function findAllUrls(val, depth = 0) {
    if (depth > 6) return [];
    const urls = [];
    if (typeof val === 'string') {
      if (/^https?:\/\//i.test(val)) urls.push(val);
    } else if (Array.isArray(val)) {
      val.forEach(v => urls.push(...findAllUrls(v, depth + 1)));
    } else if (val && typeof val === 'object') {
      Object.values(val).forEach(v => urls.push(...findAllUrls(v, depth + 1)));
    }
    return urls;
  }

  // ===== MEDIA TYPE DETECTOR =====
  const IMAGE_EXTS = ['jpg','jpeg','png','gif','webp','svg','bmp','ico','avif','tiff'];
  const VIDEO_EXTS = ['mp4','webm','ogg','mov','avi','mkv'];
  const AUDIO_EXTS = ['mp3','wav','ogg','flac','aac','m4a','opus'];

  function detectMediaType(url) {
    try {
      const u = new URL(url);
      const path = u.pathname.toLowerCase();
      const ext = path.split('.').pop().split('?')[0];
      const fullUrl = url.toLowerCase();

      if (IMAGE_EXTS.includes(ext)) return 'image';
      if (VIDEO_EXTS.includes(ext)) return 'video';
      if (AUDIO_EXTS.includes(ext)) return 'audio';

      // Pattern detection in URL
      const imagePatterns = ['/image', '/img', '/photo', '/thumbnail', '/avatar', '/qr', '/barcode', '/screenshot', '/picture', '/banner', 'pollinations', 'dicebear', '/png', '/jpg', '/jpeg', '/webp', '/gif', '/svg', '/media/image'];
      const videoPatterns = ['/video', '/stream', '/clip', '/movie'];
      const audioPatterns = ['/audio', '/sound', '/speech', '/tts', '/mp3', '/wav'];

      if (imagePatterns.some(p => fullUrl.includes(p))) return 'image';
      if (videoPatterns.some(p => fullUrl.includes(p))) return 'video';
      if (audioPatterns.some(p => fullUrl.includes(p))) return 'audio';

      // Content-type hints in URL params
      const params = u.searchParams;
      const format = (params.get('format') || params.get('type') || params.get('ext') || '').toLowerCase();
      if (IMAGE_EXTS.includes(format)) return 'image';
      if (VIDEO_EXTS.includes(format)) return 'video';
      if (AUDIO_EXTS.includes(format)) return 'audio';

    } catch (_) {}
    return 'url'; // fallback: show as clickable URL
  }

  // ===== BUILD DOWNLOAD FUNCTION =====
  function makeDownloadFn(url, filename) {
    // Try direct blob download, fallback to open in new tab
    return `window._k.downloadUrl('${encodeURIComponent(url)}','${filename}')`;
  }
  async function downloadUrl(encodedUrl, filename) {
    const url = decodeURIComponent(encodedUrl);
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('fetch failed');
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename || 'download';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
      showToast('Download started!');
    } catch (e) {
      // CORS fallback
      window.open(url, '_blank');
      showToast('Opened in new tab (CORS)', 'error');
    }
  }

  // ===== RENDER IMAGE RESPONSE =====
  function renderImage(container, src, isBlob = false) {
    const dlFn = isBlob
      ? `window._k.downloadBlob('${src}')`
      : makeDownloadFn(src, src.split('/').pop().split('?')[0] || 'image.jpg');

    container.innerHTML = `
      <div class="response-image-wrapper">
        <img
          src="${src}"
          alt="Response"
          class="response-img"
          onclick="openLightbox('${src}', '${dlFn.replace(/'/g, "\\'")}')"
          onerror="this.closest('.response-image-wrapper').innerHTML='<div class=\\'url-response-card\\'><p class=\\'url-response-label\\'>⚠ Image failed to load</p><a href=\\"${src}\\" target=\\"_blank\\" class=\\"url-response-link\\"><i class=\\"material-icons\\">open_in_new</i>${src}</a></div>'"
        />
      </div>
      <div class="media-actions">
        <button class="btn-media-action primary" onclick="${dlFn}">
          <i class="material-icons text-base">download</i> Download
        </button>
        <button class="btn-media-action" onclick="openLightbox('${src}', '${dlFn.replace(/'/g, "\\'")}')">
          <i class="material-icons text-base">fullscreen</i> Fullscreen
        </button>
        <a href="${src}" target="_blank" class="btn-media-action">
          <i class="material-icons text-base">open_in_new</i> Open URL
        </a>
      </div>`;
  }

  // ===== RENDER RESPONSE (SMART DETECTION) =====
  function renderResponse(bodyDiv, data, contentType, fullUrl) {
    // 1. Binary content type already handled in exec() — this handles JSON/text objects

    // 2. Scan for any URL in the response deeply
    const allUrls = findAllUrls(data);

    // 3. If response IS a URL string directly
    if (typeof data === 'string' && /^https?:\/\//i.test(data.trim())) {
      const url = data.trim();
      const mtype = detectMediaType(url);
      handleUrlByType(bodyDiv, url, mtype);
      return;
    }

    // 4. If data object — check top-level url-like keys first (priority)
    if (data && typeof data === 'object' && !Array.isArray(data)) {
      const URL_KEYS = ['url','image','img','qr','barcode','audio_url','audio','video','video_url',
        'screenshot','png','svg','result','src','source','link','href','file','download','media',
        'thumbnail','avatar','photo','picture','output','data'];

      let foundUrl = null;
      for (const key of URL_KEYS) {
        if (data[key] && typeof data[key] === 'string' && /^https?:\/\//i.test(data[key])) {
          foundUrl = data[key];
          break;
        }
      }
      // Also check nested one level
      if (!foundUrl) {
        for (const val of Object.values(data)) {
          if (val && typeof val === 'object' && !Array.isArray(val)) {
            for (const key of URL_KEYS) {
              if (val[key] && typeof val[key] === 'string' && /^https?:\/\//i.test(val[key])) {
                foundUrl = val[key];
                break;
              }
            }
          }
          if (foundUrl) break;
        }
      }

      if (foundUrl) {
        const mtype = detectMediaType(foundUrl);
        handleUrlByType(bodyDiv, foundUrl, mtype, data);
        return;
      }

      // Collect all URLs from deep scan
      if (allUrls.length > 0) {
        // Show multiple URLs nicely if there are several
        if (allUrls.length === 1) {
          const mtype = detectMediaType(allUrls[0]);
          handleUrlByType(bodyDiv, allUrls[0], mtype, data);
          return;
        }
        // Multiple URLs — show them in a list + JSON
        const mtype = detectMediaType(allUrls[0]);
        // If all look like images, render gallery
        const allImages = allUrls.every(u => detectMediaType(u) === 'image');
        if (allImages && allUrls.length <= 12) {
          renderGallery(bodyDiv, allUrls, data);
          return;
        }
        // Otherwise show JSON with URL highlights
        renderJSON(bodyDiv, data, allUrls);
        return;
      }
    }

    // 5. If it's an array of items with URLs
    if (Array.isArray(data)) {
      const allUrls = findAllUrls(data);
      if (allUrls.length > 0 && allUrls.every(u => detectMediaType(u) === 'image') && allUrls.length <= 12) {
        renderGallery(bodyDiv, allUrls, data);
        return;
      }
    }

    // 6. Default: pretty JSON
    renderJSON(bodyDiv, data);
  }

  function handleUrlByType(bodyDiv, url, mtype, originalData) {
    if (mtype === 'image') {
      renderImage(bodyDiv, url, false);
      if (originalData) {
        const extra = document.createElement('div');
        extra.style.marginTop = '12px';
        const jsonId = 'json-' + Math.random().toString(36).slice(2);
        extra.innerHTML = `
          <details style="margin-top:8px;">
            <summary class="text-xs text-gray-600 cursor-pointer hover:text-gray-400 transition-colors font-mono">Show raw JSON response</summary>
            <div style="margin-top:8px;" class="resp-container">
              <div class="code-block" id="${jsonId}">${highlightJSON(originalData)}</div>
              <button class="copy-btn" onclick="copyText(${JSON.stringify(JSON.stringify(originalData,null,2))}, this)">
                <i class="bi bi-copy text-xs"></i> Copy
              </button>
            </div>
          </details>`;
        bodyDiv.appendChild(extra);
      }
    } else if (mtype === 'video') {
      const dlFn = makeDownloadFn(url, url.split('/').pop().split('?')[0] || 'video.mp4');
      bodyDiv.innerHTML = `
        <video controls class="response-media-video mb-3">
          <source src="${url}" />
          Your browser does not support video.
        </video>
        <div class="media-actions">
          <button class="btn-media-action primary" onclick="${dlFn}"><i class="material-icons text-base">download</i> Download</button>
          <a href="${url}" target="_blank" class="btn-media-action"><i class="material-icons text-base">open_in_new</i> Open URL</a>
        </div>`;
    } else if (mtype === 'audio') {
      const dlFn = makeDownloadFn(url, url.split('/').pop().split('?')[0] || 'audio.mp3');
      bodyDiv.innerHTML = `
        <audio controls class="response-media-audio mb-3">
          <source src="${url}" />
          Your browser does not support audio.
        </audio>
        <div class="media-actions">
          <button class="btn-media-action primary" onclick="${dlFn}"><i class="material-icons text-base">download</i> Download</button>
          <a href="${url}" target="_blank" class="btn-media-action"><i class="material-icons text-base">open_in_new</i> Open URL</a>
        </div>`;
    } else {
      // Generic URL
      bodyDiv.innerHTML = `
        <div class="url-response-card">
          <div class="url-response-label">Response URL</div>
          <a href="${url}" target="_blank" class="url-response-link">
            <i class="material-icons">open_in_new</i>
            <span>${url}</span>
          </a>
          <div class="media-actions" style="margin-top:12px;">
            <button class="btn-media-action primary" onclick="${makeDownloadFn(url, url.split('/').pop().split('?')[0] || 'file')}">
              <i class="material-icons text-base">download</i> Try Download
            </button>
            <button class="btn-media-action" onclick="copyText('${url.replace(/'/g,"\\'")}', this)">
              <i class="bi bi-copy text-xs"></i> Copy URL
            </button>
          </div>
        </div>`;
      if (originalData) {
        const extra = document.createElement('div');
        extra.style.marginTop = '12px';
        extra.innerHTML = `
          <details>
            <summary class="text-xs text-gray-600 cursor-pointer hover:text-gray-400 transition-colors font-mono">Show raw JSON</summary>
            <div class="resp-container" style="margin-top:8px;">
              <div class="code-block">${highlightJSON(originalData)}</div>
            </div>
          </details>`;
        bodyDiv.appendChild(extra);
      }
    }
  }

  function renderGallery(bodyDiv, urls, originalData) {
    const gridCols = urls.length <= 2 ? '1fr 1fr' : urls.length <= 6 ? '1fr 1fr 1fr' : '1fr 1fr 1fr 1fr';
    let galleryHtml = `<div style="display:grid;grid-template-columns:${gridCols};gap:8px;margin-bottom:12px;">`;
    urls.forEach((url, i) => {
      const dlFn = makeDownloadFn(url, `image-${i+1}.jpg`);
      galleryHtml += `
        <div style="position:relative;">
          <img src="${url}" alt="Image ${i+1}" style="width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;cursor:zoom-in;border:1px solid #2e2e2e;"
            onclick="openLightbox('${url}', '${dlFn.replace(/'/g,"\\'")}')">
          <button onclick="${dlFn}" style="position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.7);border:none;color:#fff;border-radius:6px;padding:4px 8px;font-size:10px;cursor:pointer;display:flex;align-items:center;gap:4px;">
            <i class="material-icons" style="font-size:12px;">download</i>
          </button>
        </div>`;
    });
    galleryHtml += `</div>`;
    bodyDiv.innerHTML = galleryHtml;

    if (originalData) {
      const extra = document.createElement('div');
      extra.innerHTML = `
        <details>
          <summary class="text-xs text-gray-600 cursor-pointer hover:text-gray-400 transition-colors font-mono">Show raw JSON</summary>
          <div class="resp-container" style="margin-top:8px;">
            <div class="code-block">${highlightJSON(originalData)}</div>
          </div>
        </details>`;
      bodyDiv.appendChild(extra);
    }
  }

  function renderJSON(bodyDiv, data, highlightUrls) {
    const jsonStr = JSON.stringify(data, null, 2);
    const rawId = 'raw-' + Math.random().toString(36).slice(2);
    bodyDiv.innerHTML = `
      <div class="resp-container">
        <div class="code-block" id="${rawId}">${highlightJSON(data)}</div>
        <button class="copy-btn" onclick="copyText(document.getElementById('${rawId}').textContent, this)">
          <i class="bi bi-copy text-xs"></i> Copy
        </button>
      </div>`;
  }

  // ===== BUILD PARAMS UI =====
  function buildParams(params) {
    if (!params?.length) return '<p class="text-sm text-gray-600 italic">No parameters required.</p>';
    return params.map(p => {
      const s = p.schema || {};
      const req = !!p.required;
      const ph = (s.example ?? s.default ?? '') + '';
      let input = '';
      if (s.enum) {
        input = `<select name="${p.name}">${s.enum.map(v => `<option value="${v}">${v}</option>`).join('')}</select>`;
      } else if (s.type === 'number' || s.type === 'integer') {
        input = `<input type="number" name="${p.name}" placeholder="${ph || '0'}" />`;
      } else {
        input = `<input type="text" name="${p.name}" placeholder="${ph.replace(/"/g,'&quot;')}" />`;
      }
      return `
        <div class="mb-4">
          <label class="flex items-center gap-2 text-sm text-gray-300 mb-2 font-medium">
            <span class="font-mono text-blue-300">${p.name}</span>
            ${req ? '<span class="text-red-400 text-xs font-mono">*required</span>' : '<span class="text-gray-600 text-xs font-mono">optional</span>'}
          </label>
          ${input}
          ${p.description ? `<p class="text-xs text-gray-600 mt-1.5 leading-relaxed">${p.description}</p>` : ''}
        </div>`;
    }).join('');
  }

  // ===== TOGGLE ENDPOINT DETAIL =====
  function toggleEp(ci, ei) {
    const panel = document.getElementById(`ep-detail-${ci}-${ei}`);
    const chev = document.getElementById(`ep-chev-${ci}-${ei}`);
    const itemEl = document.getElementById(`ep-item-${ci}-${ei}`);
    if (!panel.dataset.rendered) {
      const item = EP[`${ci}-${ei}`];
      panel.innerHTML = `
        <div class="detail-block">
          <div class="section-label"><i class="material-icons">info</i> Description</div>
          <p class="text-sm text-gray-400 leading-relaxed mb-6">${item.desc || item.summary || 'No description available.'}</p>

          <div class="section-label"><i class="material-icons">tune</i> Parameters</div>
          ${buildParams(item.params)}

          <div class="flex items-center gap-3 mt-6 flex-wrap">
            <button class="btn-exec" id="exec-btn-${ci}-${ei}" onclick="window._k.exec(${ci},${ei})">
              <span class="spinner"></span>
              <i class="material-icons text-base exec-icon">play_arrow</i>
              Execute
            </button>
            <button class="btn-media-action" onclick="window._k.clearResp(${ci},${ei})">
              <i class="material-icons text-base">delete_sweep</i> Clear
            </button>
          </div>

          <div id="resp-wrap-${ci}-${ei}" style="display:none;margin-top:20px;">
            <div class="flex items-center justify-between mb-3">
              <div class="section-label mb-0"><i class="material-icons">link</i> Request URL</div>
              <span id="resp-time-${ci}-${ei}" class="resp-time"></span>
            </div>
            <div class="url-bar">
              <span id="resp-url-text-${ci}-${ei}"></span>
              <button class="copy-btn" onclick="window._k.copy(document.getElementById('resp-url-text-${ci}-${ei}').textContent, this)">
                <i class="bi bi-copy text-xs"></i> Copy
              </button>
            </div>

            <div class="section-label"><i class="material-icons">terminal</i> cURL</div>
            <div class="url-bar">
              <span id="resp-curl-text-${ci}-${ei}" style="font-size:11px;"></span>
              <button class="copy-btn" onclick="window._k.copy(document.getElementById('resp-curl-text-${ci}-${ei}').textContent, this)">
                <i class="bi bi-copy text-xs"></i> Copy
              </button>
            </div>

            <div class="section-label"><i class="material-icons">data_object</i> Response</div>
            <div id="resp-status-${ci}-${ei}"></div>
            <div id="resp-body-${ci}-${ei}"></div>
          </div>
        </div>

        <div class="detail-block">
          <div class="section-label"><i class="material-icons">list</i> HTTP Status Codes</div>
          <table class="status-table">
            <thead><tr><th>Code</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td class="sc-200"><i class="material-icons text-sm">check_circle</i> 200</td><td>OK — Request successful</td></tr>
              <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 400</td><td>Bad Request — Missing or invalid parameters</td></tr>
              <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 405</td><td>Method Not Allowed — Only GET is supported</td></tr>
              <tr><td class="sc-warn"><i class="material-icons text-sm">warning</i> 429</td><td>Too Many Requests — Rate limit exceeded</td></tr>
              <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 500</td><td>Internal Server Error — Upstream API failure</td></tr>
            </tbody>
          </table>
        </div>`;
      panel.dataset.rendered = '1';
    }
    panel.classList.toggle('open');
    chev.classList.toggle('open');
    itemEl.classList.toggle('active');
  }

  // ===== CLEAR RESPONSE =====
  function clearResp(ci, ei) {
    const wrap = document.getElementById(`resp-wrap-${ci}-${ei}`);
    if (wrap) wrap.style.display = 'none';
  }

  // ===== EXECUTE ENDPOINT =====
  async function exec(ci, ei) {
    const item = EP[`${ci}-${ei}`];
    const panel = document.getElementById(`ep-detail-${ci}-${ei}`);
    const uDiv  = document.getElementById(`resp-url-text-${ci}-${ei}`);
    const cDiv  = document.getElementById(`resp-curl-text-${ci}-${ei}`);
    const bDiv  = document.getElementById(`resp-body-${ci}-${ei}`);
    const sDiv  = document.getElementById(`resp-status-${ci}-${ei}`);
    const tDiv  = document.getElementById(`resp-time-${ci}-${ei}`);
    const btn   = document.getElementById(`exec-btn-${ci}-${ei}`);
    const wrap  = document.getElementById(`resp-wrap-${ci}-${ei}`);

    // Build URL
    let fp = item.path;
    const pr = new URLSearchParams();
    panel.querySelectorAll('input, select, textarea').forEach(el => {
      if (el.name && el.value.trim()) pr.append(el.name, el.value.trim());
    });
    const qs = pr.toString();
    if (qs) fp += (item.path.includes('?') ? '&' : '?') + qs;
    const fullUrl = location.origin + fp;
    const curl = `curl -X GET "${fullUrl}" -H "Accept: application/json"`;

    wrap.style.display = 'block';
    uDiv.textContent = fullUrl;
    cDiv.textContent = curl;
    sDiv.innerHTML = '';
    bDiv.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;padding:16px 0;">
        <div style="width:16px;height:16px;border:2px solid #333;border-top-color:#888;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
        <span style="color:#555;font-size:12px;font-family:'Ubuntu Mono',monospace;">Executing request…</span>
      </div>`;
    btn.disabled = true;
    btn.classList.add('loading');

    const startTime = performance.now();

    try {
      const r = await fetch(fp, {
        headers: { 'Accept': 'application/json, image/*, audio/*, video/*, */*' }
      });
      const elapsed = Math.round(performance.now() - startTime);
      const ct = r.headers.get('content-type') || '';

      // Status badge
      const ok = r.ok;
      sDiv.innerHTML = `
        <div class="resp-status-badge ${ok ? 'ok' : 'err'}">
          <i class="material-icons text-xs">${ok ? 'check_circle' : 'error'}</i>
          ${r.status} ${r.statusText}
        </div>`;

      // Response time
      const timeClass = elapsed < 500 ? 'fast' : elapsed > 2000 ? 'slow' : '';
      tDiv.innerHTML = `<i class="material-icons text-xs">timer</i><span class="${timeClass}">${elapsed}ms</span>`;

      // Update request counter
      totalReqs++;
      const hdr = document.getElementById('header-stats');
      const hdrCount = document.getElementById('header-req-count');
      hdr.classList.remove('hidden');
      hdr.style.display = 'flex';
      hdrCount.textContent = `${totalReqs} req${totalReqs > 1 ? 's' : ''}`;

      if (!r.ok) {
        const errText = await r.text().catch(() => '');
        let parsed = null;
        try { parsed = JSON.parse(errText); } catch (_) {}
        bDiv.innerHTML = `
          <div class="resp-container">
            <div class="code-block" style="border-color:rgba(248,113,113,0.2);">${parsed ? highlightJSON(parsed) : (errText || 'No response body.')}</div>
          </div>`;
        return;
      }

      // Handle by content type
      if (ct.includes('json')) {
        const data = await r.json();
        renderResponse(bDiv, data, ct, fullUrl);
      } else if (ct.startsWith('image/')) {
        const blob = await r.blob();
        const blobUrl = URL.createObjectURL(blob);
        const ext = ct.split('/')[1]?.split(';')[0] || 'img';
        const fname = `image.${ext}`;
        renderImage(bDiv, blobUrl, true);
        // Store blob ref for download
        window._blobRefs = window._blobRefs || {};
        window._blobRefs[blobUrl] = { blob, fname };
      } else if (ct.startsWith('video/')) {
        const blob = await r.blob();
        const blobUrl = URL.createObjectURL(blob);
        const ext = ct.split('/')[1]?.split(';')[0] || 'mp4';
        bDiv.innerHTML = `
          <video controls class="response-media-video mb-3">
            <source src="${blobUrl}" type="${ct.split(';')[0]}">
          </video>
          <div class="media-actions">
            <button class="btn-media-action primary" onclick="window._k.downloadBlob('${blobUrl}','video.${ext}')">
              <i class="material-icons text-base">download</i> Download
            </button>
          </div>`;
      } else if (ct.startsWith('audio/')) {
        const blob = await r.blob();
        const blobUrl = URL.createObjectURL(blob);
        const ext = ct.split('/')[1]?.split(';')[0] || 'mp3';
        bDiv.innerHTML = `
          <audio controls class="response-media-audio mb-3">
            <source src="${blobUrl}" type="${ct.split(';')[0]}">
          </audio>
          <div class="media-actions">
            <button class="btn-media-action primary" onclick="window._k.downloadBlob('${blobUrl}','audio.${ext}')">
              <i class="material-icons text-base">download</i> Download
            </button>
          </div>`;
      } else if (ct.includes('text/html')) {
        const text = await r.text();
        bDiv.innerHTML = `
          <div class="resp-container">
            <div class="code-block" style="max-height:300px;">${escHtml(text.slice(0, 3000))}${text.length > 3000 ? '\n…(truncated)' : ''}</div>
            <button class="copy-btn" onclick="copyText(this.previousElementSibling.textContent, this)"><i class="bi bi-copy text-xs"></i> Copy</button>
          </div>`;
      } else {
        const text = await r.text().catch(() => '(binary or unreadable content)');
        // Try parse as JSON anyway
        try {
          const maybeJson = JSON.parse(text);
          renderResponse(bDiv, maybeJson, 'application/json', fullUrl);
        } catch (_) {
          bDiv.innerHTML = `
            <div class="resp-container">
              <div class="code-block">${escHtml(text.slice(0, 5000))}${text.length > 5000 ? '\n…(truncated)' : ''}</div>
              <button class="copy-btn" onclick="copyText(this.previousElementSibling.textContent, this)"><i class="bi bi-copy text-xs"></i> Copy</button>
            </div>`;
        }
      }
    } catch (e) {
      const elapsed = Math.round(performance.now() - startTime);
      sDiv.innerHTML = `<div class="resp-status-badge err"><i class="material-icons text-xs">error</i> Network Error</div>`;
      tDiv.innerHTML = `<span class="resp-time">${elapsed}ms</span>`;
      bDiv.innerHTML = `
        <div class="code-block" style="border-color:rgba(248,113,113,0.2);color:#f87171;">
${escHtml(e.message)}

Possible causes:
• CORS policy blocked the request
• Network timeout
• Server is unreachable
        </div>`;
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ===== DOWNLOAD BLOB =====
  function downloadBlob(blobUrl, fname) {
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = fname || 'download';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast('Download started!');
  }

  // ===== LOAD CATEGORIES & ENDPOINTS =====
  async function load() {
    const cont = document.getElementById('content');
    const sideList = document.getElementById('sidebar-category-list');
    const bc = document.getElementById('breadcrumb-current');
    const bcSep = document.getElementById('breadcrumb-sep');
    const curCat = new URLSearchParams(location.search).get('cat');

    try {
      const r = await fetch('/src/openapi.json');
      if (!r.ok) throw new Error('Failed to load API spec');
      const d = await r.json();

      const cats = {};
      d.tags?.forEach(t => { cats[t.name] = { name: t.name, desc: t.description || '', eps: [] }; });

      Object.keys(d.paths || {}).forEach(p => {
        Object.keys(d.paths[p]).forEach(method => {
          const ep = d.paths[p][method];
          const tag = ep.tags?.[0] || 'Other';
          if (!cats[tag]) cats[tag] = { name: tag, desc: '', eps: [] };
          cats[tag].eps.push({
            path: p,
            method: method.toUpperCase(),
            summary: ep.summary || p,
            desc: ep.description || '',
            params: ep.parameters || []
          });
        });
      });

      const cl = Object.values(cats).filter(c => c.eps.length);
      const slug = n => n.toLowerCase().replace(/\s+/g, '-');

      // Sidebar
      sideList.innerHTML = cl.map(c => `
        <a href="/category?cat=${slug(c.name)}"
           class="flex items-center justify-between py-2 px-4 text-sm rounded-xl transition-colors ${curCat === slug(c.name) ? 'text-white bg-[#222]' : 'text-gray-500 hover:text-white hover:bg-[#1e1e1e]'}">
          <span>${c.name}</span>
          <span class="text-xs text-gray-700 font-mono">${c.eps.length}</span>
        </a>`).join('');

      if (curCat) {
        const cat = cl.find(c => slug(c.name) === curCat);
        if (cat) {
          document.title = `${cat.name} — Kyoto API`;
          bc.textContent = cat.name;
          bcSep.style.display = '';

          let h = `
            <div class="cat-header-card rounded-2xl p-8 mb-8 animate-fade-in-up" style="animation-delay:0ms">
              <div class="flex items-start justify-between flex-wrap gap-4">
                <div>
                  <h1 class="text-3xl font-bold text-white mb-2">${cat.name}</h1>
                  <p class="text-gray-500 text-sm max-w-xl leading-relaxed">${cat.desc || 'Browse available endpoints in this category.'}</p>
                </div>
                <div class="flex gap-3">
                  <div class="stat-mini">
                    <div class="text-2xl font-bold text-white font-mono">${cat.eps.length}</div>
                    <div class="text-xs text-gray-600 mt-1">Endpoints</div>
                  </div>
                </div>
              </div>
            </div>`;

          h += `<div class="space-y-1.5">`;
          cat.eps.forEach((ep, ei) => {
            const ci = cl.indexOf(cat);
            EP[`${ci}-${ei}`] = ep;
            const methodCls = `method-${ep.method.toLowerCase()}`;
            h += `
              <div class="ep-item animate-fade-in-up" id="ep-item-${ci}-${ei}" style="animation-delay:${Math.min(ei * 40, 400)}ms">
                <button class="ep-toggle-btn" onclick="window._k.toggleEp(${ci},${ei})">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-3 mb-1.5">
                      <span class="method-badge ${methodCls}">${ep.method}</span>
                      <span class="font-mono text-xs text-gray-500 truncate">${ep.path}</span>
                    </div>
                    <div class="text-sm font-semibold text-white">${ep.summary}</div>
                  </div>
                  <i class="material-icons chevron flex-shrink-0 text-gray-600" id="ep-chev-${ci}-${ei}">expand_more</i>
                </button>
                <div class="ep-detail-panel" id="ep-detail-${ci}-${ei}"></div>
              </div>`;
          });
          h += `</div>`;
          cont.innerHTML = h;
        } else {
          cont.innerHTML = `
            <div class="text-center py-20">
              <i class="material-icons text-4xl text-gray-700 mb-4 block">search_off</i>
              <p class="text-gray-500 text-sm">Category "<strong class="text-gray-300">${curCat}</strong>" not found.</p>
              <a href="/category" class="text-xs text-blue-400 hover:text-blue-300 mt-3 inline-block">← Back to all categories</a>
            </div>`;
        }
      } else {
        document.title = 'Categories — Kyoto API';
        bc.textContent = '';
        bcSep.style.display = 'none';

        const icons = {
          'AI': 'fa-brain', 'Anime': 'fa-dragon', 'News': 'fa-newspaper',
          'Internet': 'fa-globe', 'Games': 'fa-gamepad', 'Info': 'fa-circle-info',
          'Maker': 'fa-wand-magic-sparkles', 'Stalker': 'fa-magnifying-glass',
          'Tools': 'fa-screwdriver-wrench', 'Media': 'fa-image',
          'Music': 'fa-music', 'Weather': 'fa-cloud-sun', 'Finance': 'fa-chart-line',
          'Social': 'fa-users', 'Other': 'fa-code'
        };

        const totalEps = cl.reduce((s, c) => s + c.eps.length, 0);

        let h = `
          <div class="mb-8 animate-fade-in-up">
            <h1 class="text-3xl font-bold text-white mb-2">API Categories</h1>
            <p class="text-gray-500 text-sm">Browse <span class="text-white font-semibold">${totalEps}</span> endpoints across <span class="text-white font-semibold">${cl.length}</span> categories.</p>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

        cl.forEach((c, i) => {
          const icon = icons[c.name] || 'fa-code';
          h += `
            <a href="/category?cat=${slug(c.name)}" class="cat-grid-card animate-fade-in-up" style="animation-delay:${Math.min(i * 50, 500)}ms">
              <div class="flex items-start justify-between mb-4">
                <div class="w-10 h-10 rounded-xl bg-[#1a1a1a] border border-[#2e2e2e] flex items-center justify-center">
                  <i class="fas ${icon} text-gray-500 text-sm"></i>
                </div>
                <span class="text-xs text-gray-700 font-mono">${c.eps.length} endpoint${c.eps.length !== 1 ? 's' : ''}</span>
              </div>
              <h3 class="text-base font-semibold text-white mb-1.5">${c.name}</h3>
              <p class="text-sm text-gray-600 line-clamp-2 leading-relaxed">${c.desc || 'No description available.'}</p>
              <div class="flex items-center gap-1 mt-4 text-xs text-gray-600 hover:text-gray-400 transition-colors">
                <span>Explore</span>
                <i class="material-icons text-sm">arrow_forward</i>
              </div>
            </a>`;
        });

        h += `</div>`;
        cont.innerHTML = h;
      }
    } catch (e) {
      cont.innerHTML = `
        <div class="text-center py-20">
          <i class="material-icons text-4xl text-gray-700 mb-4 block">cloud_off</i>
          <p class="text-gray-500 text-sm">Failed to load API data.</p>
          <p class="text-gray-700 text-xs mt-2 font-mono">${e.message}</p>
          <button onclick="load()" class="btn-exec mt-6" style="margin:24px auto 0;">
            <i class="material-icons text-base exec-icon">refresh</i> Retry
          </button>
        </div>`;
    }
  }

  // ===== SPA NAVIGATION =====
  window.addEventListener('popstate', load);
  document.addEventListener('click', function(e) {
    const l = e.target.closest('a');
    if (l && l.href && l.href.startsWith(location.origin + '/category')) {
      e.preventDefault();
      const u = new URL(l.href);
      history.pushState({}, '', u.pathname + (u.search || ''));
      load();
      if (window.innerWidth < 768) closeSb();
    }
  });

  // ===== EXPOSE GLOBALS =====
  window._k = { exec, copy: copyText, toggleEp, downloadUrl, downloadBlob, clearResp };
  window.copyText = copyText;
  window.openLightbox = openLightbox;

  // ===== INIT =====
  load();
})();
</script>

</body>
</html>
