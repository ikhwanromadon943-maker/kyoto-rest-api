    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />

    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              'mono': ['Ubuntu Mono', 'monospace'],
              'sans': ['Space Grotesk', 'system-ui', 'sans-serif']
            }
          }
        }
      }
    </script>
    <style>
      ::-webkit-scrollbar { display: none !important; }
      body { position: relative; scroll-behavior: smooth; letter-spacing: 0.025em; background-color: #181818; }
      body::before {
        content: '';
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; min-height: 100vh; z-index: -1;
        background-image: linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(148, 163, 184, 0.06) 1px, transparent 1px);
        background-size: 40px 40px; pointer-events: none;
      }
      #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      #overlay { transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      #overlay.show { opacity: 1 !important; visibility: visible !important; }
      @media (max-width: 767px) {
        #sidebar { transform: translateX(-100%); }
        #sidebar.open { transform: translateX(0); }
      }
      @media (min-width: 768px) {
        body { padding-left: 16rem; }
        body > div { padding-left: 0 !important; }
        #sidebar { transform: translateX(0) !important; }
        #overlay { display: none !important; }
        #sidebarToggle { display: none !important; }
        #sidebarClose { display: none !important; }
      }
      .fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body class="bg-[#181818] text-gray-200 antialiased font-sans min-h-screen">
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-[#181818] text-gray-200 border-r border-[#2E2E2E] z-[100] overflow-y-auto">
      <div class="px-8 py-7 flex items-center justify-start md:hidden">
        <button id="sidebarClose" class="text-white flex items-center justify-center">
          <i class="material-icons text-2xl">close</i>
        </button>
      </div>
      <div class="px-5 pb-8 pt-0 md:pt-8">
        <nav>
          <p class="font-medium text-sm text-gray-300 mb-4 px-4">Get Started</p>
          <div class="space-y-1">
            <a href="/category" class="flex items-center justify-between py-1 px-4 text-sm text-white bg-[#222222] rounded-xl">
              <span>Category</span>
              <i class="material-icons text-lg ml-3">keyboard_arrow_right</i>
            </a>
          </div>
          <p class="font-medium text-sm text-gray-300 my-4 px-4">Available Endpoints</p>
          <div class="space-y-1" id="sidebar-dynamic-list"></div>
        </nav>
      </div>
    </aside>
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-60 opacity-0 invisible z-[90] md:hidden"></div>
    <header id="navbar" class="top-0 z-50">
      <div class="max-w-2xl mx-auto px-8 py-7 flex items-center justify-between">
        <div class="flex items-center gap-6">
          <button id="sidebarToggle" class="text-sm text-white flex items-center justify-center md:hidden">
            <i class="material-icons text-2xl">notes</i>
          </button>
        </div>
      </div>
    </header>
    <div class="flex flex-col min-h-screen">
      <main class="max-w-2xl mx-auto px-8 pt-4 pb-8 flex-1 w-full">
        <div id="content" class="space-y-3"></div>
      </main>
      <footer class="bg-[#212121] relative z-10 border-t border-[#2E2E2E] w-full">
        <div class="max-w-2xl mx-auto px-8 py-12">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div>
              <h3 class="font-semibold text-white mb-3">About</h3>
              <p class="text-sm text-gray-400 leading-relaxed">This interactive interface allows you to explore and test our comprehensive collection of API endpoints in real-time.</p>
            </div>
            <div>
              <h3 class="font-semibold text-white mb-3">Quick Links</h3>
              <div class="flex flex-col items-start space-y-2">
                <a href="/introduction" class="text-sm text-gray-400 hover:text-white transition-colors">Documentation</a>
                <a href="/category" class="text-sm text-gray-400 hover:text-white transition-colors">All Categories</a>
              </div>
            </div>
            <div>
              <h3 class="font-semibold text-white mb-3">Connect</h3>
              <div class="flex gap-3">
                <a href="https://whatsapp.com/channel/0029Vb69z8n1dAvztHQTDu3r" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-gray-600 hover:text-white transition-all">
                  <i class="fab fa-whatsapp text-lg"></i>
                </a>
                <a href="https://www.instagram.com/elrayyxml" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-gray-600 hover:text-white transition-all">
                  <i class="fab fa-instagram text-lg"></i>
                </a>
              </div>
            </div>
          </div>
          <div class="pt-8 border-t border-[#2E2E2E] text-center">
            <p class="text-sm text-gray-400">&copy; 2026 Kyoto API, All rights reserved.</p>
          </div>
        </div>
      </footer>
    </div>
    <script>
      const sidebarToggle = document.getElementById('sidebarToggle');
      const sidebarClose = document.getElementById('sidebarClose');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); document.body.classList.add('overflow-hidden'); }
      function closeSidebar() { if (window.innerWidth < 768) { sidebar.classList.remove('open'); overlay.classList.remove('show'); document.body.classList.remove('overflow-hidden'); } }
      sidebarToggle.addEventListener('click', openSidebar);
      sidebarClose.addEventListener('click', closeSidebar);
      overlay.addEventListener('click', closeSidebar);

      async function loadCategories() {
        const content = document.getElementById('content');
        const sideList = document.getElementById('sidebar-dynamic-list');
        try {
          const res = await fetch('/src/openapi.json');
          const data = await res.json();

          // Kumpulin kategori + hitung endpoint
          const categories = {};
          if (data.tags) {
            data.tags.forEach(t => { categories[t.name] = { name: t.name, count: 0 }; });
          }
          Object.keys(data.paths || {}).forEach(path => {
            const pi = data.paths[path];
            Object.keys(pi).forEach(method => {
              const ep = pi[method];
              const tag = ep.tags?.[0] || 'Other';
              if (!categories[tag]) categories[tag] = { name: tag, count: 0 };
              categories[tag].count++;
            });
          });

          const cats = Object.values(categories).filter(c => c.count > 0);

          // URL slug: lowercase nama tag, e.g. "AI" -> "ai", "Zodiak" -> "zodiak"
          const toSlug = name => name.toLowerCase().replace(/\s+/g, '-');

          // Render cards — URL /category/:slug sama kayak Nexray
          content.innerHTML = cats.map((cat, i) => `
            <a href="/category/${toSlug(cat.name)}" class="block bg-[#212121] border border-[#2E2E2E] rounded-xl p-6 hover:border-[#383838] group fade-in" style="animation-delay: ${i * 100}ms">
              <div class="flex items-center justify-between">
                <div class="flex-1">
                  <div class="flex items-center gap-3 mb-2">
                    <h4 class="text-lg font-semibold text-white">${cat.name}</h4>
                    <span class="px-2 py-1 bg-[#2a2a2a] text-gray-400 text-xs font-medium rounded">${cat.count} endpoint${cat.count !== 1 ? 's' : ''}</span>
                  </div>
                  <p class="text-sm text-gray-400">Explore ${cat.name} related endpoints and features.</p>
                </div>
                <div class="ml-4"><span class="material-icons text-white group-hover:text-white">arrow_forward</span></div>
              </div>
            </a>`).join('');

          // Render sidebar
          sideList.innerHTML = cats.map(cat => `
            <a href="/category/${toSlug(cat.name)}" class="flex items-center justify-between py-1 px-4 text-sm text-gray-400 hover:text-white hover:bg-[#222222] rounded-xl">
              <span>${cat.name}</span>
              <i class="material-icons text-lg ml-3">keyboard_arrow_right</i>
            </a>`).join('');

        } catch (err) {
          content.innerHTML = '<p class="text-red-400 text-sm text-center py-8">Failed to load categories.</p>';
        }
      }

      document.addEventListener('DOMContentLoaded', loadCategories);
    </script>
  </body>
</html>
