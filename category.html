<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category.</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ["Ubuntu Mono", "monospace"],
            sans: ["Space Grotesk", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    ::-webkit-scrollbar { display: none !important; }
    body { background-color: #181818; letter-spacing: 0.025em; }
    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background-image: linear-gradient(rgba(148,163,184,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,0.06) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    #sidebar { transition: transform 0.3s; }
    #overlay { transition: opacity 0.3s, visibility 0.3s; }
    #overlay.show { opacity: 1 !important; visibility: visible !important; }
    @media (max-width: 767px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
    }
    @media (min-width: 768px) {
      body { padding-left: 16rem; }
      #sidebar { transform: translateX(0) !important; }
      #overlay { display: none !important; }
      #sidebarToggle, #sidebarClose { display: none !important; }
    }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .method-badge {
      display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 8px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; font-family: "Ubuntu Mono", monospace; flex-shrink: 0;
    }
    .method-get { background: rgba(59,130,246,0.12); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .ep-toggle-btn {
      width: 100%; background: #212121; border: 1px solid #2e2e2e; color: #fff;
      padding: 16px 20px; display: flex; align-items: flex-start; justify-content: space-between;
      cursor: pointer; font-family: "Space Grotesk", sans-serif; text-align: left;
      transition: all 0.2s; gap: 12px; border-radius: 12px;
    }
    .ep-item { margin-bottom: 6px; }
    .ep-item.active .ep-toggle-btn { border-radius: 12px 12px 0 0; border-bottom: 1px solid #2e2e2e; background: #1a1a1a; }
    .ep-toggle-btn:hover { background: #1c1c1c; border-color: #383838; }
    .ep-detail-panel {
      background: #141414; border: 1px solid #2e2e2e; border-top: none;
      border-radius: 0 0 12px 12px; display: none;
    }
    .ep-detail-panel.open { display: block; animation: fadeIn 0.3s ease-out; }
    .detail-block { padding: 20px 24px; border-bottom: 1px solid #2e2e2e; }
    .detail-block:last-child { border-bottom: none; }
    .cat-toggle-btn {
      width: 100%; background: #212121; border: 1px solid #2e2e2e; color: #fff;
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; font-family: "Space Grotesk", sans-serif; font-size: 15px; font-weight: 600;
      text-align: left; transition: all 0.2s; gap: 12px; border-radius: 12px; margin-bottom: 4px;
    }
    .cat-toggle-btn:hover { background: #262626; border-color: #383838; }
    .cat-body { display: none; padding: 8px 0 16px 0; }
    .cat-body.show { display: block; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%; background: #181818; border: 1px solid #2e2e2e; color: #e2e0f0;
      font-family: "Ubuntu Mono", monospace; font-size: 13px; padding: 10px 14px;
      border-radius: 10px; outline: none; transition: border-color 0.2s; box-sizing: border-box;
    }
    input:focus, select:focus, textarea:focus { border-color: #555; }
    input::placeholder, textarea::placeholder { color: #555; }
    textarea { resize: vertical; min-height: 80px; }
    .btn-exec {
      background: #fff; color: #181818; border: none; padding: 10px 24px;
      font-family: "Space Grotesk", sans-serif; font-size: 13px; font-weight: 600;
      letter-spacing: 0.3px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-exec:hover { background: #e0e0e0; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .btn-exec:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .code-block {
      background: #111; border: 1px solid #2e2e2e; border-radius: 10px;
      padding: 16px; font-family: "Ubuntu Mono", monospace; font-size: 12px;
      color: #e2e0f0; overflow-x: auto; white-space: pre-wrap; word-break: break-all;
      max-height: 500px; overflow-y: auto; line-height: 1.8;
    }
    .code-block img, .code-block video, .code-block audio { max-width: 100%; border-radius: 6px; display: block; }
    .section-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #888;
      margin-bottom: 12px; font-family: "Ubuntu Mono", monospace; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label i { font-size: 16px; }
    .param-group { margin-bottom: 14px; }
    .param-label { font-size: 13px; color: #ccc; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; font-weight: 500; }
    .req-star { color: #f87171; font-size: 14px; }
    .param-desc { font-size: 11px; color: #666; margin-top: 5px; }
    .chevron { transition: transform 0.25s; }
    .chevron.open { transform: rotate(180deg); }
    .status-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .status-table th { text-align: left; padding: 10px 16px; border-bottom: 1px solid #2e2e2e; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; font-family: "Ubuntu Mono", monospace; }
    .status-table td { padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .status-table td:first-child { font-family: "Ubuntu Mono", monospace; }
    .status-table tr:last-child td { border-bottom: none; }
    .sc-200 { color: #4ade80; }
    .sc-err { color: #f87171; }
    .sc-warn { color: #facc15; }
    .ep-link { font-family: "Ubuntu Mono", monospace; font-size: 13px; color: #bbb; word-break: break-all; }
    .ep-summary { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 2px; }
    .copy-btn {
      background: transparent; border: 1px solid #2e2e2e; color: #999; padding: 8px 16px;
      font-family: "Space Grotesk", sans-serif; font-size: 11px; cursor: pointer;
      border-radius: 8px; transition: all 0.2s; letter-spacing: 0.3px; white-space: nowrap;
    }
    .copy-btn:hover { color: #fff; border-color: #555; }
    .flex-row-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  </style>
</head>
<body class="bg-[#181818] text-gray-200 antialiased font-sans min-h-screen">

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-[#181818] text-gray-200 border-r border-[#2e2e2e] z-[100] overflow-y-auto">
  <div class="px-8 py-7 flex items-center justify-start md:hidden">
    <button id="sidebarClose" class="text-white"><i class="material-icons text-2xl">close</i></button>
  </div>
  <div class="px-5 pb-8 pt-0 md:pt-8">
    <nav>
      <p class="font-medium text-sm text-gray-300 mb-4 px-4">Get Started</p>
      <div class="space-y-1">
        <a href="/category" class="flex items-center justify-between py-1 px-4 text-sm text-white bg-[#222] rounded-xl" id="sidebar-category-link">
          <span>Category</span><i class="material-icons text-lg ml-3">keyboard_arrow_right</i>
        </a>
      </div>
      <p class="font-medium text-sm text-gray-300 my-4 px-4">Available Endpoints</p>
      <div class="space-y-1" id="sidebar-dynamic-list"></div>
    </nav>
  </div>
</aside>
<div id="overlay" class="fixed inset-0 bg-black bg-opacity-60 opacity-0 invisible z-[90] md:hidden"></div>

<!-- Header -->
<header class="top-0 z-50">
  <div class="max-w-3xl mx-auto px-8 py-7 flex items-center justify-between">
    <button id="sidebarToggle" class="text-sm text-white flex items-center justify-center md:hidden">
      <i class="material-icons text-2xl">notes</i>
    </button>
  </div>
</header>

<div class="flex flex-col min-h-screen">
  <main class="max-w-3xl mx-auto px-8 pt-4 pb-8 flex-1 w-full">
    <div id="breadcrumb" class="mb-6 hidden">
      <a href="/category" class="text-sm text-gray-400 hover:text-white flex items-center gap-1">
        <i class="material-icons text-base">arrow_back</i><span>Back to Categories</span>
      </a>
    </div>
    <div class="relative mb-6">
      <i class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg pointer-events-none z-10">search</i>
      <input type="text" id="searchInput" placeholder="Search endpoints..." class="w-full bg-[#212121] border border-[#2e2e2e] text-white font-sans text-sm py-3 pl-12 pr-4 rounded-xl outline-none focus:border-[#444] transition-colors" />
    </div>
    <div id="content" class="space-y-3"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-[#212121] relative z-10 border-t border-[#2e2e2e] w-full">
    <div class="max-w-3xl mx-auto px-8 py-12">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
        <div><h3 class="font-semibold text-white mb-3">About</h3><p class="text-sm text-gray-400">Interactive API explorer — browse endpoints and test them directly.</p></div>
        <div><h3 class="font-semibold text-white mb-3">Quick Links</h3><div class="flex flex-col gap-2"><a href="/introduction" class="text-sm text-gray-400 hover:text-white">Documentation</a><a href="/category" class="text-sm text-gray-400 hover:text-white">All Categories</a></div></div>
        <div><h3 class="font-semibold text-white mb-3">Connect</h3><div class="flex gap-3"><a href="https://whatsapp.com/channel/0029Vb69z8n1dAvztHQTDu3r" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-gray-600 hover:text-white"><i class="fab fa-whatsapp text-lg"></i></a><a href="https://www.instagram.com/elrayyxml" target="_blank" class="w-9 h-9 flex items-center justify-center rounded-lg bg-[#1a1a1a] hover:bg-[#2a2a2a] text-gray-600 hover:text-white"><i class="fab fa-instagram text-lg"></i></a></div></div>
      </div>
      <div class="pt-8 border-t border-[#2e2e2e] text-center"><p class="text-sm text-gray-400">&copy; 2026 Kyoto API</p></div>
    </div>
  </footer>
</div>

<script>
(function() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  function openSb() { sidebar.classList.add("open"); overlay.classList.add("show"); document.body.classList.add("overflow-hidden"); }
  function closeSb() { if(window.innerWidth<768){ sidebar.classList.remove("open"); overlay.classList.remove("show"); document.body.classList.remove("overflow-hidden"); } }
  document.getElementById("sidebarToggle").addEventListener("click", openSb);
  document.getElementById("sidebarClose").addEventListener("click", closeSb);
  overlay.addEventListener("click", closeSb);

  const EP = {};

  function buildParams(params) {
    if (!params?.length) return '<p class="text-sm text-gray-600">No parameters needed.</p>';
    return params.map(p => {
      const s = p.schema || {}, req = !!p.required, ph = (s.example ?? s.default ?? '') + '';
      let input = '';
      if (s.enum) input = `<select name="${p.name}">${s.enum.map(v=>`<option value="${v}">${v}</option>`).join('')}</select>`;
      else if (s.type==='number'||s.type==='integer') input = `<input type="number" name="${p.name}" placeholder="${ph}">`;
      else input = `<input type="text" name="${p.name}" placeholder="${ph.replace(/"/g,'&quot;')}">`;
      return `<div class="param-group"><label class="param-label">${p.name}${req?' <span class="req-star">*</span>':''}</label>${input}${p.description?`<div class="param-desc">${p.description}</div>`:''}</div>`;
    }).join('');
  }

  async function exec(ci, ei) {
    const item = EP[`${ci}-${ei}`];
    const panel = document.getElementById(`ep-detail-${ci}-${ei}`);
    const wrap = document.getElementById(`resp-wrap-${ci}-${ei}`);
    const uDiv = document.getElementById(`resp-url-${ci}-${ei}`);
    const cDiv = document.getElementById(`resp-curl-${ci}-${ei}`);
    const bDiv = document.getElementById(`resp-body-${ci}-${ei}`);
    const btn = document.getElementById(`exec-btn-${ci}-${ei}`);

    let fp = item.path;
    const pr = new URLSearchParams();
    panel.querySelectorAll('input, select, textarea').forEach(el => { if(el.name && el.value) pr.append(el.name, el.value); });
    const qs = pr.toString();
    if(qs) fp += (item.path.includes('?')?'&':'?') + qs;
    const curl = `curl -X GET "${location.origin}${fp}"`;

    wrap.style.display='block';
    uDiv.textContent = location.origin + fp;
    cDiv.textContent = curl;
    bDiv.innerHTML = '<span style="color:#666">Loading...</span>';
    btn.disabled = true;

    try {
      const r = await fetch(fp);
      const ct = r.headers.get('content-type')||'';
      if(!r.ok){ const t = await r.text().catch(()=>''); throw new Error(r.status+' '+r.statusText+'\n'+t); }
      if(ct.includes('json')) bDiv.textContent = JSON.stringify(await r.json(),null,2);
      else if(ct.startsWith('image/')){
        const blob = await r.blob(); const url = URL.createObjectURL(blob);
        bDiv.innerHTML = `<img src="${url}" alt="img"><br><a href="${url}" download style="color:#60a5fa;font-size:12px;"><i class="material-icons text-sm">download</i> Download</a>`;
      } else if(ct.startsWith('video/')){
        const blob = await r.blob(); const url = URL.createObjectURL(blob);
        bDiv.innerHTML = `<video controls src="${url}" style="max-width:100%"></video><br><a href="${url}" download style="color:#60a5fa;font-size:12px;"><i class="material-icons text-sm">download</i> Download</a>`;
      } else if(ct.startsWith('audio/')){
        const blob = await r.blob(); const url = URL.createObjectURL(blob);
        bDiv.innerHTML = `<audio controls src="${url}" style="width:100%"></audio><br><a href="${url}" download style="color:#60a5fa;font-size:12px;"><i class="material-icons text-sm">download</i> Download</a>`;
      } else bDiv.textContent = await r.text();
    } catch(e){ bDiv.innerHTML = `<span style="color:#f87171">${e.message}</span>`; }
    btn.disabled = false;
  }

  async function copyText(t, btn) {
    const o = btn.innerHTML;
    try { await navigator.clipboard.writeText(t); btn.innerHTML = '<i class="material-icons text-sm">check</i> Copied'; }
    catch(e){ btn.innerHTML = 'Failed'; }
    setTimeout(()=>btn.innerHTML=o, 2000);
  }

  function toggleCat(ci) {
    document.getElementById(`cat-body-${ci}`).classList.toggle('show');
    document.getElementById(`cat-chev-${ci}`).classList.toggle('open');
  }

  function toggleEp(ci, ei) {
    const panel = document.getElementById(`ep-detail-${ci}-${ei}`);
    const chev = document.getElementById(`ep-chev-${ci}-${ei}`);
    const itemEl = document.getElementById(`ep-item-${ci}-${ei}`);
    if(!panel.dataset.rendered){
      const item = EP[`${ci}-${ei}`];
      panel.innerHTML = `
        <div class="detail-block">
          <div class="section-label"><i class="material-icons">play_arrow</i> TRY IT OUT</div>
          <p class="text-sm text-gray-400 mb-4">${item.desc||item.summary||''}</p>
          <div class="section-label" style="margin-top:16px;"><i class="material-icons">tune</i> Parameters</div>
          ${buildParams(item.params)}
          <button class="btn-exec" id="exec-btn-${ci}-${ei}" onclick="window._k.exec(${ci},${ei})"><i class="material-icons text-base">play_arrow</i> Execute</button>
          <div id="resp-wrap-${ci}-${ei}" style="display:none;margin-top:16px;">
            <div class="section-label"><i class="material-icons">link</i> Request URL</div>
            <div class="flex-row-btns" style="margin-bottom:16px;"><div class="code-block" style="flex:1;margin:0;" id="resp-url-${ci}-${ei}"></div><button class="copy-btn" onclick="window._k.copy(document.getElementById('resp-url-${ci}-${ei}').textContent,this)"><i class="material-icons text-sm">content_copy</i> Copy</button></div>
            <div class="section-label"><i class="material-icons">terminal</i> cURL</div>
            <div class="flex-row-btns" style="margin-bottom:16px;"><div class="code-block" style="flex:1;margin:0;" id="resp-curl-${ci}-${ei}"></div><button class="copy-btn" onclick="window._k.copy(document.getElementById('resp-curl-${ci}-${ei}').textContent,this)"><i class="material-icons text-sm">content_copy</i> Copy</button></div>
            <div class="section-label"><i class="material-icons">data_object</i> Response</div>
            <div class="code-block" id="resp-body-${ci}-${ei}"></div>
          </div>
        </div>
        <div class="detail-block">
          <div class="section-label"><i class="material-icons">list</i> HTTP STATUS CODES</div>
          <table class="status-table">
            <thead><tr><th>Code</th><th>Description</th></tr></thead>
            <tbody>
              <tr><td class="sc-200"><i class="material-icons text-sm">check_circle</i> 200</td><td>OK</td></tr>
              <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 400</td><td>Bad Request</td></tr>
              <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 405</td><td>Method Not Allowed</td></tr>
              <tr><td class="sc-warn"><i class="material-icons text-sm">warning</i> 429</td><td>Too Many Requests</td></tr>
              <tr><td class="sc-err"><i class="material-icons text-sm">error</i> 500</td><td>Internal Server Error</td></tr>
            </tbody>
          </table>
        </div>`;
      panel.dataset.rendered='1';
    }
    panel.classList.toggle('open');
    chev.classList.toggle('open');
    itemEl.classList.toggle('active');
  }

  async function load() {
    const cont = document.getElementById('content');
    const side = document.getElementById('sidebar-dynamic-list');
    const bc = document.getElementById('breadcrumb');
    const pn = location.pathname;
    const m = pn.match(/^\/category\/(.+)$/);
    try {
      const r = await fetch('/src/openapi.json');
      const d = await r.json();
      const cats = {};
      d.tags?.forEach(t=>{ cats[t.name]={name:t.name,eps:[]}; });
      Object.keys(d.paths||{}).forEach(p=>{
        Object.keys(d.paths[p]).forEach(method=>{
          const ep=d.paths[p][method];
          const tag=ep.tags?.[0]||'Other';
          if(!cats[tag]) cats[tag]={name:tag,eps:[]};
          cats[tag].eps.push({path:p,method:method.toUpperCase(),summary:ep.summary||'',desc:ep.description||'',params:ep.parameters||[]});
        });
      });
      const cl = Object.values(cats).filter(c=>c.eps.length);
      const slug = n=>n.toLowerCase().replace(/\s+/g,'-');

      side.innerHTML = cl.map(c=>`<a href="/category/${slug(c.name)}" class="block py-1 px-4 text-sm rounded-xl ${m&&m[1]===slug(c.name)?'text-white bg-[#222]':'text-gray-400 hover:text-white hover:bg-[#222]'}">${c.name}</a>`).join('');

      if(m){
        const cat = cl.find(c=>slug(c.name)===m[1]);
        if(cat){
          bc.classList.remove('hidden');
          document.title = cat.name + ' - Category.';
          let h = `<h2 class="text-2xl font-bold text-white mb-2">${cat.name}</h2><p class="text-sm text-gray-400 mb-6">${cat.eps.length} endpoints</p>`;
          cat.eps.forEach((ep,ei)=>{
            const ci = cl.indexOf(cat);
            EP[`${ci}-${ei}`]=ep;
            h += `<div class="ep-item" id="ep-item-${ci}-${ei}"><button class="ep-toggle-btn" onclick="window._k.toggleEp(${ci},${ei})"><div class="flex-1"><div class="flex items-center gap-3 mb-1"><span class="method-badge method-get">${ep.method}</span><span class="ep-link">${ep.path}</span></div><div class="ep-summary">${ep.summary}</div></div><i class="material-icons chevron" id="ep-chev-${ci}-${ei}">expand_more</i></button><div class="ep-detail-panel" id="ep-detail-${ci}-${ei}"></div></div>`;
          });
          cont.innerHTML = h;
        } else { cont.innerHTML = '<p class="text-red-400 text-sm text-center py-8">Category not found.</p>'; }
      } else {
        bc.classList.add('hidden');
        document.title='Category.';
        cont.innerHTML = cl.map((c,i)=>`<a href="/category/${slug(c.name)}" class="block bg-[#212121] border border-[#2e2e2e] rounded-xl p-6 hover:border-[#383838] group fade-in" style="animation-delay:${i*100}ms"><div class="flex justify-between items-center"><div><h4 class="text-lg font-semibold text-white">${c.name}</h4><span class="text-xs text-gray-400">${c.eps.length} endpoints</span></div><i class="material-icons text-gray-500">arrow_forward</i></div></a>`).join('');
      }
    } catch(e){ cont.innerHTML = '<p class="text-red-400 text-sm text-center py-8">Failed to load data.</p>'; }
  }

  document.getElementById('searchInput').addEventListener('input', function(){
    const q=this.value.toLowerCase();
    document.querySelectorAll('.ep-item').forEach(el=>el.style.display=el.textContent.toLowerCase().includes(q)?'':'none');
  });

  window.addEventListener('popstate',load);
  document.addEventListener('click',function(e){
    const l=e.target.closest('a');
    if(l&&l.href&&l.href.startsWith(location.origin+'/category')){
      e.preventDefault();
      history.pushState({},'',new URL(l.href).pathname);
      load();
      if(window.innerWidth<768) closeSb();
    }
  });

  window._k = { exec, copy: copyText, toggleEp, toggleCat };
  document.addEventListener('DOMContentLoaded', load);
})();
</script>
</body>
</html>
