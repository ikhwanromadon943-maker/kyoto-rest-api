<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kyoto API Documentation — Browse and test 55+ live endpoints across 16 categories." />
    <title>Kyoto API — Docs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    <style>
        :root{--bg:#09090e;--bg2:#0e0e16;--card:rgba(255,255,255,0.03);--card-h:rgba(255,255,255,0.055);--border:rgba(255,255,255,0.07);--border-h:rgba(255,107,107,0.35);--text:#e2e0f0;--muted:rgba(226,224,240,0.42);--accent:#ff6b6b;--accent2:#ff8e53;--green:#4ade80;--yellow:#facc15;--red:#f87171}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        ::-webkit-scrollbar{display:none}
        body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.7}
        .blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
        .b1{width:440px;height:440px;background:radial-gradient(circle,rgba(255,107,107,.065) 0%,transparent 70%);top:-160px;left:-100px;animation:b1a 22s ease-in-out infinite}
        .b2{width:340px;height:340px;background:radial-gradient(circle,rgba(255,142,83,.045) 0%,transparent 70%);bottom:-60px;right:-60px;animation:b2a 28s ease-in-out infinite}
        @keyframes b1a{0%,100%{transform:translate(0,0)}50%{transform:translate(45px,30px)}}
        @keyframes b2a{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-50px)}}
        #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:18px;transition:opacity .6s,visibility .6s}
        #loader.gone{opacity:0;visibility:hidden}
        .lring{width:36px;height:36px;border:1px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite}
        .ltxt{font-size:9px;letter-spacing:.35em;color:var(--muted);text-transform:uppercase}
        @keyframes spin{to{transform:rotate(360deg)}}
        header{position:sticky;top:0;z-index:50;background:rgba(9,9,14,.9);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border)}
        .hdr{max-width:940px;margin:0 auto;padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
        .lmark{width:24px;height:24px;border:1px solid rgba(255,107,107,.4);display:flex;align-items:center;justify-content:center;position:relative}
        .lmark::before{content:'';position:absolute;inset:3px;background:var(--accent);opacity:.12}
        .lmark i{font-size:8px;color:var(--accent);position:relative;z-index:1}
        .ltname{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:.18em;color:var(--text);text-transform:uppercase}
        .vpill{font-size:7px;letter-spacing:.22em;color:var(--accent);border:1px solid rgba(255,107,107,.25);padding:2px 7px;text-transform:uppercase}
        .hdr-right{display:flex;align-items:center;gap:14px}
        .hdr-right a{font-size:9px;letter-spacing:.14em;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color .2s}
        .hdr-right a:hover{color:var(--accent)}
        #menu-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 10px;cursor:pointer;font-size:11px;transition:all .2s;display:none}
        #menu-btn:hover{border-color:var(--border-h);color:var(--text)}
        .wrap{max-width:940px;margin:0 auto;padding:28px;position:relative;z-index:1;display:grid;grid-template-columns:180px 1fr;gap:28px}
        @media(max-width:640px){.wrap{grid-template-columns:1fr}.side{display:none}.side.open{display:block;position:fixed;inset:0;z-index:100;background:var(--bg);padding:24px;overflow-y:auto}#menu-btn{display:flex}}
        .side{position:sticky;top:68px;height:calc(100vh - 68px);overflow-y:auto}
        .side-section{margin-bottom:20px}
        .side-label{font-size:7px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
        .side-link{display:flex;align-items:center;gap:7px;padding:4px 0;color:var(--muted);text-decoration:none;font-size:8px;letter-spacing:.06em;transition:all .2s;border-left:1px solid transparent;padding-left:7px}
        .side-link:hover{color:var(--text);border-left-color:var(--accent)}
        .side-close{display:none;background:none;border:1px solid var(--border);color:var(--muted);padding:6px 10px;cursor:pointer;margin-bottom:16px}
        @media(max-width:640px){.side-close{display:block}}
        .content{min-width:0}
        .search-wrap{margin-bottom:20px;position:relative}
        .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:10px}
        #searchInput{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:9px;padding:10px 14px 10px 32px;outline:none;transition:border-color .2s}
        #searchInput::placeholder{color:var(--muted)}
        #searchInput:focus{border-color:var(--border-h)}

        .cat-group{margin-bottom:1px}
        .cat-toggle{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;text-align:left;transition:all .2s;gap:10px}
        .cat-toggle:hover{background:var(--card-h);border-color:var(--border-h)}
        .cat-left{display:flex;align-items:center;gap:8px}
        .cat-icon{width:18px;height:18px;background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .cat-icon i{font-size:7px;color:var(--accent)}
        .cat-name{font-family:'Syne',sans-serif;font-weight:600;font-size:11px;letter-spacing:.04em}
        .cat-count{font-size:7px;color:var(--muted);letter-spacing:.1em}
        .cat-chevron{font-size:9px;color:var(--muted);transition:transform .3s}
        .cat-chevron.open{transform:rotate(180deg)}
        .cat-body{display:none;border:1px solid var(--border);border-top:none}
        .cat-body.show{display:block}
        .ep-item{border-bottom:1px solid var(--border)}
        .ep-item:last-child{border-bottom:none}
        .ep-toggle{width:100%;background:none;border:none;color:var(--text);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-family:'DM Mono',monospace;font-size:8px;text-align:left;transition:background .2s;gap:10px}
        .ep-toggle:hover{background:var(--card)}
        .ep-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
        .method{font-size:7px;font-weight:600;letter-spacing:.1em;padding:2px 6px;flex-shrink:0;text-transform:uppercase}
        .m-get{background:rgba(74,222,128,.1);color:var(--green);border:1px solid rgba(74,222,128,.2)}
        .ep-path{font-size:8px;color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .ep-name{font-size:7px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .status-pill{font-size:6px;letter-spacing:.1em;padding:2px 5px;border:1px solid;flex-shrink:0;text-transform:uppercase}
        .s-ready{color:var(--green);border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.06)}
        .ep-chevron{font-size:8px;color:var(--muted);transition:transform .3s;flex-shrink:0}
        .ep-chevron.open{transform:rotate(180deg)}
        .ep-detail{display:none;background:var(--bg2);padding:14px 18px;border-top:1px solid var(--border)}
        .ep-detail.show{display:block}
        .ep-desc{font-size:8px;color:var(--muted);line-height:1.8;margin-bottom:12px}
        .panel-title{font-size:7px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
        .panel-title::before{content:'';width:12px;height:1px;background:var(--border)}
        .param-group{margin-bottom:10px}
        .param-label{font-size:8px;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:4px}
        .req-star{color:var(--accent)}
        .param-desc{font-size:7px;color:var(--muted);margin-top:3px;line-height:1.5}
        input[type=text],input[type=number],select,textarea{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:8px;padding:8px 10px;outline:none;transition:border-color .2s}
        input:focus,select:focus,textarea:focus{border-color:var(--border-h)}
        select option{background:var(--bg2)}
        textarea{resize:vertical;min-height:60px}
        .btn-exec{background:var(--accent);color:#fff;border:none;padding:8px 18px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
        .btn-exec::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:opacity .25s}
        .btn-exec:hover::before{opacity:1}
        .btn-exec span{position:relative;z-index:1}
        .btn-exec:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(255,107,107,.25)}
        .btn-clear{background:transparent;color:var(--muted);border:1px solid var(--border);padding:7px 18px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s;display:none}
        .btn-clear:hover{color:var(--text);border-color:var(--border-h)}
        .resp-wrap{margin-top:12px;display:none}
        .resp-wrap.show{display:block}
        .resp-block{margin-bottom:10px}
        .resp-label{font-size:7px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
        .copy-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:2px 7px;cursor:pointer;font-size:7px;font-family:'DM Mono',monospace;transition:all .2s}
        .copy-btn:hover{border-color:var(--border-h);color:var(--text)}
        .code-box{background:rgba(0,0,0,.4);border:1px solid var(--border);padding:8px 12px;font-size:8px;overflow-x:auto;line-height:1.7;color:var(--text)}
        .code-box pre{margin:0}
        .code-box img{max-width:100%;height:auto;display:block}
        .no-results{text-align:center;padding:40px 20px;display:none}
        .no-results p{font-size:9px;color:var(--muted)}
        @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .fadeup{animation:fadeUp .3s ease forwards}
    </style>
</head>
<body>
    <div class="blob b1"></div><div class="blob b2"></div>
    <div id="loader"><div class="lring"></div><span class="ltxt">Loading API</span></div>
    <header>
        <div class="hdr">
            <a href="/" class="logo"><div class="lmark"><i class="fas fa-torii-gate"></i></div><span class="ltname">Kyoto</span></a>
            <div class="hdr-right">
                <span class="vpill">v2.0</span>
                <a href="/">Home</a>
                <a href="/status">Status</a>
                <button id="menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>
    <div class="wrap">
        <aside class="side" id="sidebar">
            <button class="side-close" id="sidebar-close"><i class="fas fa-times"></i></button>
            <div class="side-section"><div class="side-label">Navigation</div><a href="/" class="side-link"><i class="fas fa-home" style="font-size:7px;color:var(--accent)"></i>Home</a></div>
            <div class="side-section"><div class="side-label">Categories</div><div id="side-cats"></div></div>
        </aside>
        <main class="content">
            <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search 55+ endpoints..." /></div>
            <div id="content"><div class="no-results" id="noResults"><p>No results found.</p></div><div id="apiList"></div></div>
        </main>
    </div>
    <script>
        document.getElementById('menu-btn').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
        document.getElementById('sidebar-close').addEventListener('click', () => document.getElementById('sidebar').classList.remove('open'));

        async function copyToClipboard(text, btn) {
            const orig = btn.innerHTML;
            try { await navigator.clipboard.writeText(text); btn.textContent = 'Copied!'; } catch(e) { btn.textContent = 'Failed'; }
            setTimeout(() => btn.innerHTML = orig, 1500);
        }

        function hlJSON(el) { if (window.hljs) hljs.highlightElement(el); }
        function toggleCategory(idx) { document.getElementById(`cat-body-${idx}`).classList.toggle('show'); document.getElementById(`cat-chev-${idx}`).classList.toggle('open'); }

        function toggleEndpoint(ci, ei) {
            const panel = document.getElementById(`ep-detail-${ci}-${ei}`);
            const chev = document.getElementById(`ep-chev-${ci}-${ei}`);
            if (!panel.dataset.rendered) { const item = _epData[`${ci}-${ei}`]; if (item) panel.innerHTML = buildDetailHTML(ci, ei, item); panel.dataset.rendered = '1'; }
            panel.classList.toggle('show'); chev.classList.toggle('open');
        }

        async function executeRequest(event, ci, ei, method, path) {
            event.preventDefault();
            const form = document.getElementById(`form-${ci}-${ei}`);
            const respWrap = document.getElementById(`resp-${ci}-${ei}`);
            const clearBtn = document.getElementById(`clear-${ci}-${ei}`);
            respWrap.classList.add('show');
            const formData = new FormData(form);
            const params = new URLSearchParams();
            for (const [k,v] of formData.entries()) { if (typeof v==='string' && v) params.append(k, v); }
            const qs = params.toString();
            let fullPath = path + (qs ? (path.includes('?')?'&':'?') + qs : '');
            let curlCmd = `curl "${window.location.origin}${fullPath}"`;
            document.getElementById(`resp-url-${ci}-${ei}`).textContent = `${window.location.origin}${fullPath}`;
            document.getElementById(`resp-curl-${ci}-${ei}`).textContent = curlCmd;
            const bodyDiv = document.getElementById(`resp-body-${ci}-${ei}`);
            bodyDiv.innerHTML = '<span style="color:var(--muted);font-size:8px">Loading...</span>';
            try {
                const res = await fetch(fullPath);
                const ct = res.headers.get('content-type') || '';
                if (ct.includes('application/json')) { const data = await res.json(); bodyDiv.innerHTML = `<pre><code class="language-json">${JSON.stringify(data,null,2)}</code></pre>`; setTimeout(() => hlJSON(bodyDiv.querySelector('code')), 0); }
                else if (ct.startsWith('image/')) { const blob = await res.blob(); const u = URL.createObjectURL(blob); bodyDiv.innerHTML = `<img src="${u}" style="max-width:100%;height:auto"><br><a href="${u}" download style="color:var(--accent);font-size:7px">Download</a>`; }
                else { bodyDiv.textContent = await res.text(); }
            } catch(err) { bodyDiv.innerHTML = `<pre style="color:var(--red)">${err.message}</pre>`; }
            clearBtn.style.display = 'inline-block';
        }

        function clearResponse(ci, ei) { document.getElementById(`resp-${ci}-${ei}`).classList.remove('show'); document.getElementById(`clear-${ci}-${ei}`).style.display = 'none'; }

        const _epData = {};

        function buildFormFields(item) {
            let f = '';
            if (item.parameters) {
                item.parameters.forEach(param => {
                    const s = param.schema || {};
                    const req = !!param.required;
                    const lbl = `${param.name}${req?' <span class="req-star">*</span>':''}`;
                    const desc = param.description ? `<div class="param-desc">${param.description}</div>` : '';
                    const ph = (s.example ?? s.default ?? '') + '';
                    if (Array.isArray(s.enum) && s.enum.length) {
                        f += `<div class="param-group"><label class="param-label">${lbl}</label><select name="${param.name}"${req?' required':''}>${s.enum.map(v=>`<option value="${v}">${v}</option>`).join('')}</select>${desc}</div>`;
                    } else {
                        const t = (s.type==='number'||s.type==='integer')?'number':'text';
                        f += `<div class="param-group"><label class="param-label">${lbl}</label><input type="${t}" name="${param.name}" placeholder="${ph.replace(/"/g,'&quot;')}"${req?' required':''}>${desc}</div>`;
                    }
                });
            }
            return f;
        }

        function buildDetailHTML(ci, ei, item) {
            const formFields = buildFormFields(item);
            return `${item.desc?`<div class="ep-desc">${item.desc}</div>`:''}
            <div class="panel-title">Try It Out</div>
            <form id="form-${ci}-${ei}" onsubmit="executeRequest(event,${ci},${ei},'${item.method}','${item.path}')">
                ${formFields}
                <div style="display:flex;gap:6px;margin-top:10px">
                    <button type="submit" class="btn-exec"><span>Execute</span></button>
                    <button type="button" id="clear-${ci}-${ei}" class="btn-clear" onclick="clearResponse(${ci},${ei})">Clear</button>
                </div>
            </form>
            <div class="resp-wrap" id="resp-${ci}-${ei}">
                <div class="resp-block" style="margin-top:10px"><div class="resp-label"><span>Request URL</span><button class="copy-btn" onclick="copyToClipboard(document.getElementById('resp-url-${ci}-${ei}').textContent,this)">Copy</button></div><div class="code-box"><pre id="resp-url-${ci}-${ei}"></pre></div></div>
                <div class="resp-block"><div class="resp-label"><span>cURL Command</span><button class="copy-btn" onclick="copyToClipboard(document.getElementById('resp-curl-${ci}-${ei}').textContent,this)">Copy</button></div><div class="code-box"><pre id="resp-curl-${ci}-${ei}"></pre></div></div>
                <div class="resp-block"><div class="resp-label"><span>Response</span><button class="copy-btn" onclick="copyToClipboard(document.getElementById('resp-body-${ci}-${ei}').innerText,this)">Copy</button></div><div class="code-box" id="resp-body-${ci}-${ei}"></div></div>
            </div>`;
        }

        async function loadApis() {
            const apiList = document.getElementById('apiList');
            const sideCats = document.getElementById('side-cats');
            try {
                const res = await fetch('/src/openapi.json');
                const data = await res.json();
                const categories = {};
                if (data.tags) data.tags.forEach(t => { categories[t.name] = {name:t.name, items:[]}; });
                Object.keys(data.paths||{}).forEach(path => {
                    const pi = data.paths[path];
                    Object.keys(pi).forEach(method => {
                        const ep = pi[method];
                        const tag = ep.tags?.[0] || 'Other';
                        if (!categories[tag]) categories[tag] = {name:tag, items:[]};
                        categories[tag].items.push({ path, method: method.toUpperCase(), name: ep.summary || 'No summary', desc: ep.description || '', status: 'ready', parameters: ep.parameters });
                    });
                });
                const frag = document.createDocumentFragment();
                const sideFragHtml = [];
                Object.values(categories).forEach((cat, ci) => {
                    if (!cat.items.length) return;
                    const catId = `cat-${ci}`;
                    sideFragHtml.push(`<a href="#${catId}" class="side-link"><i class="fas fa-folder" style="font-size:7px;color:var(--muted)"></i>${cat.name}</a>`);
                    let itemsHtml = '';
                    cat.items.forEach((item, ei) => {
                        _epData[`${ci}-${ei}`] = item;
                        itemsHtml += `<div class="ep-item api-item" data-path="${item.path}" data-alias="${item.name}" data-description="${item.desc}" data-category="${cat.name}">
                            <button class="ep-toggle" onclick="toggleEndpoint(${ci},${ei})">
                                <div class="ep-left"><span class="method m-get">GET</span><div style="min-width:0;flex:1"><div class="ep-path">${item.path}</div><div class="ep-name">${item.name}</div></div><span class="status-pill s-ready">live</span></div>
                                <i class="fas fa-chevron-down ep-chevron" id="ep-chev-${ci}-${ei}"></i>
                            </button><div class="ep-detail" id="ep-detail-${ci}-${ei}"></div></div>`;
                    });
                    const wrapper = document.createElement('div');
                    wrapper.className = 'cat-group';
                    wrapper.id = catId;
                    wrapper.dataset.category = cat.name;
                    wrapper.innerHTML = `<button class="cat-toggle" onclick="toggleCategory(${ci})"><div class="cat-left"><div class="cat-icon"><i class="fas fa-folder"></i></div><div><div class="cat-name">${cat.name}</div><div class="cat-count">${cat.items.length} endpoint${cat.items.length!==1?'s':''}</div></div></div><i class="fas fa-chevron-down cat-chevron" id="cat-chev-${ci}"></i></button><div class="cat-body" id="cat-body-${ci}">${itemsHtml}</div>`;
                    frag.appendChild(wrapper);
                });
                apiList.innerHTML = ''; apiList.appendChild(frag);
                sideCats.innerHTML = sideFragHtml.join('');
            } catch(err) { apiList.innerHTML = '<p style="color:var(--red);font-size:9px">Failed to load API data.</p>'; }
        }

        document.getElementById('searchInput').addEventListener('input', function() {
            const q = this.value.toLowerCase();
            let vis = 0;
            document.querySelectorAll('.api-item').forEach(el => { const m = el.dataset.path.toLowerCase().includes(q)||el.dataset.alias.toLowerCase().includes(q)||el.dataset.description.toLowerCase().includes(q); el.style.display = m?'':'none'; });
            document.querySelectorAll('.cat-group').forEach(g => { const h = [...g.querySelectorAll('.api-item')].some(e=>e.style.display!=='none'); g.style.display = h?'':'none'; if(h)vis++; });
            document.getElementById('noResults').style.display = vis===0&&q?'block':'none';
        });

        document.addEventListener('DOMContentLoaded', () => { loadApis(); document.getElementById('loader').classList.add('gone'); });
    </script>
</body>
</html>
