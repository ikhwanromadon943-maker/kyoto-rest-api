<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Kyoto API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
    <style>
        :root{--bg:#09090e;--text:#e2e0f0;--muted:rgba(226,224,240,0.42);--accent:#ff6b6b;--accent2:#ff8e53}
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
        body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
        .container{text-align:center;position:relative;z-index:1;padding:32px}
        .code{font-family:'Syne',sans-serif;font-size:clamp(80px,15vw,140px);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
        .title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px}
        .sub{font-size:10px;color:var(--muted);margin-bottom:32px;line-height:1.8}
        .links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
        .links a{color:var(--muted);text-decoration:none;font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:10px 20px;border:1px solid rgba(255,255,255,0.07);transition:all .3s}
        .links a:hover{color:var(--accent);border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.04)}
        .links a.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
        .links a.primary:hover{background:var(--accent2);border-color:var(--accent2)}
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="title">Page Not Found</div>
        <p class="sub">The page you're looking for doesn't exist<br />or has been moved to another location.</p>
        <div class="links">
            <a href="/" class="primary">Back to Home</a>
            <a href="/docs">Documentation</a>
            <a href="/status">System Status</a>
        </div>
    </div>
</body>
</html>
