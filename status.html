<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kyoto API Status — Real-time system health and uptime monitoring for 55+ live endpoints." />
    <title>Status — Kyoto API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root{--bg:#09090e;--card:rgba(255,255,255,0.03);--card-h:rgba(255,255,255,0.055);--border:rgba(255,255,255,0.07);--border-h:rgba(255,107,107,0.35);--text:#e2e0f0;--muted:rgba(226,224,240,0.42);--accent:#ff6b6b;--accent2:#ff8e53;--green:#4ade80;--yellow:#facc15;--red:#f87171;--blue:#38bdf8;--purple:#a78bfa}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;-webkit-font-smoothing:antialiased}
        ::-webkit-scrollbar{display:none}
        body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.7}
        header{position:sticky;top:0;z-index:50;background:rgba(9,9,14,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:16px 0}
        .hdr{max-width:960px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between}
        .logo{display:flex;align-items:center;gap:10px;text-decoration:none}
        .logo-mark{width:24px;height:24px;border:1px solid rgba(255,107,107,.4);display:flex;align-items:center;justify-content:center;position:relative}
        .logo-mark i{font-size:8px;color:var(--accent);position:relative;z-index:1}
        .logo-txt{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;letter-spacing:.18em;color:var(--text);text-transform:uppercase}
        .vpill{font-size:7px;letter-spacing:.22em;color:var(--accent);border:1px solid rgba(255,107,107,.25);padding:2px 7px;text-transform:uppercase}
        .nav-links{display:flex;gap:22px}
        .nav-links a{font-size:9px;letter-spacing:.15em;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color .2s}
        .nav-links a:hover,.nav-links a.active{color:var(--accent)}
        main{max-width:960px;margin:0 auto;padding:40px 28px;position:relative;z-index:1}

        .status-banner{display:flex;align-items:center;gap:14px;padding:20px 24px;border:1px solid;margin-bottom:36px;transition:all .5s}
        .status-banner.all-good{background:rgba(74,222,128,.06);border-color:rgba(74,222,128,.2)}
        .status-banner.partial{background:rgba(250,204,21,.06);border-color:rgba(250,204,21,.2)}
        .status-banner.down{background:rgba(248,113,113,.06);border-color:rgba(248,113,113,.2)}
        .status-dot-big{width:14px;height:14px;border-radius:50%;flex-shrink:0}
        .status-dot-big.online{background:var(--green);box-shadow:0 0 16px rgba(74,222,128,.5);animation:pulse 2s infinite}
        .status-dot-big.degraded{background:var(--yellow);box-shadow:0 0 16px rgba(250,204,21,.5);animation:pulse 3s infinite}
        .status-dot-big.offline{background:var(--red);box-shadow:0 0 16px rgba(248,113,113,.5)}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .status-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
        .status-sub{font-size:10px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

        .uptime-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:40px}
        @media(max-width:640px){.uptime-stats{grid-template-columns:repeat(2,1fr)}}
        .ustat{background:var(--bg);padding:22px 16px;text-align:center}
        .usv{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--text);line-height:1;margin-bottom:6px}
        .usl{font-size:8px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase}

        .section-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:.05em;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:var(--text)}
        .section-title i{color:var(--accent)}
        .auto-refresh{font-size:8px;color:var(--green);letter-spacing:.2em;margin-left:auto;display:flex;align-items:center;gap:6px}
        .refresh-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}

        .service-list{border:1px solid var(--border);margin-bottom:40px}
        .service-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);gap:10px;transition:all .3s;font-size:9px}
        .service-row:last-child{border-bottom:none}
        .service-row:hover{background:var(--card-h)}
        .service-row.checking{opacity:.6}
        .svc-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
        .svc-indicator{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all .3s}
        .svc-indicator.online{background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.4)}
        .svc-indicator.degraded{background:var(--yellow);box-shadow:0 0 6px rgba(250,204,21,.4)}
        .svc-indicator.offline{background:var(--red);box-shadow:0 0 6px rgba(248,113,113,.4)}
        .svc-indicator.checking{background:var(--blue);box-shadow:0 0 6px rgba(56,189,248,.4);animation:pulse .8s infinite}
        .svc-info{min-width:0}
        .svc-name{font-size:9px;font-weight:500;color:var(--text)}
        .svc-url{font-size:7px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .svc-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
        .svc-latency{font-size:7px;color:var(--muted);min-width:48px;text-align:right;font-variant-numeric:tabular-nums}
        .svc-status{font-size:6px;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;border:1px solid;flex-shrink:0;min-width:60px;text-align:center}
        .ss-online{color:var(--green);border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.06)}
        .ss-degraded{color:var(--yellow);border-color:rgba(250,204,21,.25);background:rgba(250,204,21,.06)}
        .ss-offline{color:var(--red);border-color:rgba(248,113,113,.25);background:rgba(248,113,113,.06)}
        .ss-checking{color:var(--blue);border-color:rgba(56,189,248,.25);background:rgba(56,189,248,.06)}

        .category-divider{display:flex;align-items:center;gap:10px;margin:24px 0 10px;padding:0 4px}
        .category-divider:first-of-type{margin-top:0}
        .cat-label{font-size:7px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
        .cat-line{flex:1;height:1px;background:var(--border)}

        .incident-list{border:1px solid var(--border);margin-bottom:40px}
        .incident-row{padding:12px 14px;background:var(--card);border-bottom:1px solid var(--border)}
        .incident-row:last-child{border-bottom:none}
        .incident-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px}
        .incident-title{font-size:9px;font-weight:500;color:var(--text)}
        .incident-date{font-size:7px;color:var(--muted);white-space:nowrap;flex-shrink:0}
        .incident-desc{font-size:8px;color:var(--muted);line-height:1.7}
        .incident-badge{font-size:6px;letter-spacing:.12em;text-transform:uppercase;padding:2px 6px;border:1px solid;flex-shrink:0}
        .ib-resolved{color:var(--green);border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.06)}

        .footer-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding-top:14px;border-top:1px solid var(--border)}
        .footer-bar span{font-size:8px;color:var(--muted)}
        .footer-bar button{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:8px;padding:7px 14px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;transition:all .3s}
        .footer-bar button:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,107,107,.06)}

        footer{max-width:960px;margin:0 auto;padding:20px 28px 36px;border-top:1px solid var(--border);position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between}
        .fcopy{font-size:8px;color:var(--muted);letter-spacing:.05em}
        .flinks{display:flex;gap:16px}
        .flinks a{font-size:8px;color:var(--muted);text-decoration:none;transition:color .2s}
        .flinks a:hover{color:var(--accent)}
    </style>
</head>
<body>
    <header>
        <div class="hdr">
            <a href="/" class="logo">
                <div class="logo-mark"><i class="fas fa-torii-gate"></i></div>
                <span class="logo-txt">Kyoto</span>
            </a>
            <div style="display:flex;align-items:center;gap:14px">
                <span class="vpill">v2.0</span>
                <nav class="nav-links">
                    <a href="/">Home</a>
                    <a href="/docs">Docs</a>
                    <a href="/status" class="active">Status</a>
                </nav>
            </div>
        </div>
    </header>
    <main>
        <div class="status-banner all-good" id="overall-banner">
            <div class="status-dot-big online" id="overall-dot"></div>
            <div>
                <div class="status-title" id="overall-title">Checking all systems...</div>
                <div class="status-sub">
                    <span id="overall-sub">Initializing...</span>
                    <span style="color:var(--muted)">·</span>
                    <span id="last-checked">--</span>
                </div>
            </div>
        </div>

        <div class="uptime-stats">
            <div class="ustat"><div class="usv" id="stat-online" style="color:var(--green)">—</div><div class="usl">Online</div></div>
            <div class="ustat"><div class="usv" id="stat-degraded" style="color:var(--yellow)">—</div><div class="usl">Degraded</div></div>
            <div class="ustat"><div class="usv" id="stat-offline" style="color:var(--red)">—</div><div class="usl">Offline</div></div>
            <div class="ustat"><div class="usv" id="stat-avg-latency" style="color:var(--blue)">—</div><div class="usl">Avg Latency</div></div>
        </div>

        <div class="section-title">
            <i class="fas fa-server"></i> Service Status
            <span class="auto-refresh"><span class="refresh-dot"></span> Auto-refresh 30s</span>
        </div>

        <div id="service-container"></div>

        <div class="section-title"><i class="fas fa-history"></i> Recent Incidents</div>
        <div class="incident-list" id="incident-list"></div>

        <div class="footer-bar">
            <span>Last checked: <strong id="last-checked-footer">--</strong></span>
            <button onclick="checkAllEndpoints()"><i class="fas fa-rotate-right"></i> Refresh Now</button>
        </div>
    </main>
    <footer>
        <span class="fcopy">&copy; <span id="year"></span> Kyoto API</span>
        <div class="flinks">
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
            <a href="/status">Status</a>
        </div>
    </footer>

    <script>
        const BASE_URL = window.location.origin;
        const CHECK_INTERVAL = 30000;

        const serviceCategories = [
            { name: 'AI', services: [
                { name: 'ChatGPT', path: '/api/ai/chatgpt?text=ping' },
                { name: 'DALLE', path: '/api/ai/dalle?prompt=ping' },
                { name: 'Translate', path: '/api/ai/translate?text=hello&to=id' },
                { name: 'Text to Speech', path: '/api/ai/text-to-speech?text=ping' },
                { name: 'Image Variation', path: '/api/ai/image-variation?prompt=ping' },
            ]},
            { name: 'Anime', services: [
                { name: 'Manga Search', path: '/api/anime/search?query=One+Piece' },
                { name: 'Anime Info', path: '/api/anime/anime?title=Jujutsu+Kaisen' },
                { name: 'Random Manga', path: '/api/anime/random' },
                { name: 'Waifu', path: '/api/anime/waifu?category=waifu' },
                { name: 'Character', path: '/api/anime/character?query=Naruto' },
            ]},
            { name: 'News', services: [
                { name: 'CNN Indonesia', path: '/api/news/cnn' },
                { name: 'CNBC Indonesia', path: '/api/news/cnbc' },
                { name: 'Detik.com', path: '/api/news/detik' },
            ]},
            { name: 'Fun', services: [
                { name: 'Joke', path: '/api/fun/joke' },
                { name: 'Dad Joke', path: '/api/fun/dadjoke' },
                { name: 'Random Fact', path: '/api/fun/fact' },
                { name: 'Chuck Norris', path: '/api/fun/chuck-norris' },
                { name: 'Quote', path: '/api/fun/quote' },
                { name: 'Cat Fact', path: '/api/fun/cat-fact' },
                { name: 'Bored', path: '/api/fun/bored' },
            ]},
            { name: 'Games', services: [
                { name: 'Games List', path: '/api/games/list' },
                { name: 'Game Detail', path: '/api/games/detail?id=452' },
            ]},
            { name: 'Info', services: [
                { name: 'Wikipedia', path: '/api/info/wikipedia?title=Indonesia' },
                { name: 'Dictionary', path: '/api/info/dictionary?word=hello' },
                { name: 'GitHub User', path: '/api/info/github?username=torvalds' },
                { name: 'NPM Package', path: '/api/info/npm?package=express' },
                { name: 'Country Info', path: '/api/info/country?name=Japan' },
                { name: 'Holidays', path: '/api/info/holiday?year=2026&country=ID' },
            ]},
            { name: 'Maker', services: [
                { name: 'Canvas', path: '/api/maker/canvas?text=ping' },
                { name: 'Meme', path: '/api/maker/meme?top=hi&bottom=test' },
                { name: 'Quote Image', path: '/api/maker/quote-image?text=ping&author=test' },
                { name: 'Password', path: '/api/maker/password?length=16' },
            ]},
            { name: 'Stalker', services: [
                { name: 'My IP', path: '/api/stalker/my-ip' },
                { name: 'IP Lookup', path: '/api/stalker/ip?ip=8.8.8.8' },
                { name: 'DNS Lookup', path: '/api/stalker/dns?domain=google.com' },
            ]},
            { name: 'Random', services: [
                { name: 'Random User', path: '/api/random/user' },
                { name: 'Random Number', path: '/api/random/number?min=1&max=100' },
                { name: 'UUID', path: '/api/random/uuid' },
                { name: 'Random Color', path: '/api/random/color' },
                { name: 'Timestamp', path: '/api/random/timestamp' },
            ]},
            { name: 'Zodiak', services: [
                { name: 'Horoscope', path: '/api/zodiak/horoscope?sign=aries' },
            ]},
            { name: 'Tools', services: [
                { name: 'QR Code', path: '/api/tools/qr?text=ping' },
                { name: 'Shortlink', path: '/api/tools/shortlink?url=https://google.com' },
                { name: 'Weather', path: '/api/tools/cuaca?city=Tokyo' },
                { name: 'Calculator', path: '/api/tools/calculator?expr=2+2' },
                { name: 'Screenshot', path: '/api/tools/ssweb?url=https://google.com' },
            ]},
            { name: 'Media', services: [
                { name: 'Canvas', path: '/api/media/canvas?text=ping' },
                { name: 'Meme', path: '/api/media/meme?top=hi&bottom=test' },
                { name: 'Quote Image', path: '/api/media/quote-image?text=ping' },
            ]},
            { name: 'Crypto', services: [
                { name: 'Crypto Price', path: '/api/crypto/price?id=bitcoin' },
                { name: 'Crypto List', path: '/api/crypto/list' },
            ]},
            { name: 'Quran', services: [
                { name: 'Surah Info', path: '/api/quran/surah?number=1' },
                { name: 'Search Quran', path: '/api/quran/search?keyword=Allah' },
            ]},
            { name: 'Animals', services: [
                { name: 'Random Dog', path: '/api/animals/dog' },
                { name: 'Random Cat', path: '/api/animals/cat' },
                { name: 'Cat Fact', path: '/api/animals/cat-fact' },
            ]},
            { name: 'Number Facts', services: [
                { name: 'Random Fact', path: '/api/number-fact/random' },
                { name: 'Number Fact', path: '/api/number-fact/number?number=42' },
                { name: 'Math Fact', path: '/api/number-fact/math?number=7' },
                { name: 'Year Fact', path: '/api/number-fact/year?year=2024' },
            ]},
            { name: 'Frontend', services: [
                { name: 'Landing Page', path: '/' },
                { name: 'Documentation', path: '/docs' },
                { name: 'Status Page', path: '/status' },
            ]},
        ];

        const incidents = [
            { title: 'Kyoto API v2.0 Deployed', date: 'May 10, 2026 · 12:00 UTC', desc: 'Major update! 55+ live endpoints across 16 categories. All free, no API key required. Old Downloader & Storage endpoints deprecated.', status: 'resolved' },
            { title: 'Minor outage — AI ChatGPT endpoint', date: 'May 1, 2026 · 09:15 UTC', desc: 'Brief 3-minute error on /api/ai/chatgpt caused by upstream API restart. Resolved automatically.', status: 'resolved' },
        ];

        let serviceStatuses = {};

        function renderServiceList() {
            const container = document.getElementById('service-container');
            let html = '';
            let globalIndex = 0;
            serviceCategories.forEach(cat => {
                html += `<div class="category-divider"><span class="cat-label">${cat.name}</span><div class="cat-line"></div></div><div class="service-list">`;
                cat.services.forEach(svc => {
                    const idx = globalIndex;
                    const status = serviceStatuses[idx] || { status: 'checking', latency: '—' };
                    html += `<div class="service-row" id="svc-row-${idx}">
                        <div class="svc-left"><div class="svc-indicator ${status.status}" id="svc-dot-${idx}"></div><div class="svc-info"><div class="svc-name">${svc.name}</div></div></div>
                        <div class="svc-right"><div class="svc-latency" id="svc-latency-${idx}">${status.latency}</div><div class="svc-status ss-${status.status}" id="svc-status-${idx}">${status.status}</div></div>
                    </div>`;
                    globalIndex++;
                });
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function renderIncidents() {
            document.getElementById('incident-list').innerHTML = incidents.map(i => `<div class="incident-row"><div class="incident-hdr"><div class="incident-title">${i.title}</div><div class="incident-badge ib-resolved">${i.status}</div></div><div class="incident-date">${i.date}</div><div class="incident-desc">${i.desc}</div></div>`).join('');
        }

        function updateSummary() {
            let online = 0, degraded = 0, offline = 0, totalLatency = 0, count = 0;
            Object.entries(serviceStatuses).forEach(([, s]) => {
                if (s.status === 'online') online++;
                else if (s.status === 'degraded') degraded++;
                else if (s.status === 'offline') offline++;
                if (s.latencyMs) { totalLatency += s.latencyMs; count++; }
            });
            document.getElementById('stat-online').textContent = online;
            document.getElementById('stat-degraded').textContent = degraded;
            document.getElementById('stat-offline').textContent = offline;
            document.getElementById('stat-avg-latency').textContent = count > 0 ? `${Math.round(totalLatency / count)}ms` : '—';
            const banner = document.getElementById('overall-banner');
            const dot = document.getElementById('overall-dot');
            const title = document.getElementById('overall-title');
            banner.className = 'status-banner'; dot.className = 'status-dot-big';
            if (offline > 3) { banner.classList.add('down'); dot.classList.add('offline'); title.textContent = `${offline} services down`; }
            else if (offline > 0 || degraded > 3) { banner.classList.add('partial'); dot.classList.add('degraded'); title.textContent = 'Some systems degraded'; }
            else { banner.classList.add('all-good'); dot.classList.add('online'); title.textContent = 'All Systems Operational'; }
        }

        function updateTimeDisplay() {
            const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'UTC', hour12: false }) + ' UTC';
            document.getElementById('last-checked').textContent = now;
            document.getElementById('last-checked-footer').textContent = now;
            document.getElementById('overall-sub').textContent = `Last checked: ${now}`;
        }

        async function pingEndpoint(service, index) {
            const startTime = performance.now();
            const url = `${BASE_URL}${service.path}`;
            serviceStatuses[index] = { status: 'checking', latency: '...' };
            updateServiceUI(index, 'checking', '...');
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);
                const res = await fetch(url, { method: 'GET', signal: controller.signal });
                clearTimeout(timeout);
                const latency = Math.round(performance.now() - startTime);
                const status = latency > 800 ? 'degraded' : 'online';
                serviceStatuses[index] = { status, latency: `${latency}ms`, latencyMs: latency };
            } catch (err) {
                serviceStatuses[index] = { status: 'offline', latency: err.name === 'AbortError' ? 'timeout' : 'error', latencyMs: null };
            }
            updateServiceUI(index, serviceStatuses[index].status, serviceStatuses[index].latency);
        }

        function updateServiceUI(index, status, latency) {
            const dot = document.getElementById(`svc-dot-${index}`);
            const statusEl = document.getElementById(`svc-status-${index}`);
            const latencyEl = document.getElementById(`svc-latency-${index}`);
            if (dot) dot.className = 'svc-indicator ' + status;
            if (statusEl) { statusEl.className = 'svc-status ss-' + status; statusEl.textContent = status; }
            if (latencyEl) latencyEl.textContent = latency;
        }

        async function checkAllEndpoints() {
            updateTimeDisplay();
            const allServices = serviceCategories.flatMap(c => c.services);
            const promises = allServices.map((service, index) => pingEndpoint(service, index));
            await Promise.allSettled(promises);
            updateSummary();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').textContent = new Date().getFullYear();
            renderServiceList();
            renderIncidents();
            checkAllEndpoints();
            setInterval(checkAllEndpoints, CHECK_INTERVAL);
        });
    </script>
</body>
</html>
