    <style>
      * { -webkit-tap-highlight-color: transparent; }

        background-color: #181818; overscroll-behavior: none; -webkit-font-smoothing: antialiased;
      }
      body::before {
        content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        background-image: linear-gradient(rgba(148,163,184,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,0.04) 1px, transparent 1px);

      }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
      @keyframes pulse-fast { 0%,100%{opacity:1} 50%{opacity:.3} }
      @keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
      @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
      .pulse-dot{animation:pulse 2s infinite}
      .pulse-dot-slow{animation:pulse 3s infinite}
      .pulse-dot-fast{animation:pulse-fast 1s infinite}
      .fade-in{animation:fadeIn .35s ease-out forwards;opacity:0}
      .slide-in{animation:slideIn .25s ease-out}
      .live-glow{box-shadow:0 0 6px rgba(74,222,128,.4)}
      .degraded-glow{box-shadow:0 0 6px rgba(250,204,21,.4)}
      .offline-glow{box-shadow:0 0 6px rgba(248,113,113,.4)}
      .safe-bottom{padding-bottom:env(safe-area-inset-bottom,16px)}
    </style>

      const incidents = [

      function getServiceCount() {
        return serviceCategories.reduce((sum, cat) => sum + cat.services.length, 0);
      }

      function renderServiceList() {
        const container = document.getElementById('service-container');
        let html = '';
        let globalIndex = 0;
        serviceCategories.forEach(cat => {
          html += `<div class="mb-2 fade-in">
            <div class="flex items-center gap-2 mb-1.5 px-0.5">
              <i class="fas ${cat.icon} text-gray-500 text-[10px]"></i>
              <span class="text-[10px] text-gray-500 uppercase tracking-wider font-semibold">${cat.name}</span>
              <span class="text-[9px] text-gray-600">${cat.services.length}</span>
            </div>
            <div class="bg-[#212121] border border-[#2E2E2E] rounded-lg overflow-hidden">`;
          cat.services.forEach(svc => {
            const idx = globalIndex;
            const status = serviceStatuses[idx] || { status: 'pending', latency: '—' };
            html += `<div class="flex items-center justify-between py-2 px-3 border-b border-[#2E2E2E] last:border-b-0 active:bg-[#1a1a1a] transition-colors" id="svc-row-${idx}">
              <div class="flex items-center gap-2 min-w-0 flex-1">

                  status.status === 'online' ? 'bg-green-400 live-glow' : 
                  status.status === 'degraded' ? 'bg-yellow-400 degraded-glow' : 
                  status.status === 'offline' ? 'bg-red-400 offline-glow' : 
                  'bg-blue-400 animate-pulse'
                }"></div>
                <span class="text-xs text-gray-200 truncate">${svc.name}</span>
              </div>
              <div class="flex items-center gap-2 flex-shrink-0">
                <span class="text-[10px] text-gray-500 font-mono w-12 text-right" id="svc-latency-${idx}">${status.latency}</span>
                <span id="svc-status-${idx}" class="text-[9px] uppercase tracking-wider px-1.5 py-0.5 rounded font-semibold transition-all duration-300 ${
                  status.status === 'online' ? 'text-green-400 bg-green-400/10' : 
                  status.status === 'degraded' ? 'text-yellow-400 bg-yellow-400/10' : 
                  status.status === 'offline' ? 'text-red-400 bg-red-400/10' : 
                  'text-blue-400 bg-blue-400/10'
                }">${status.status}</span>
              </div>
            </div>`;
            globalIndex++;
          });
          html += `</div></div>`;
        });
        container.innerHTML = html;
      }

      function renderIncidents() {
        document.getElementById('incident-list').innerHTML = incidents.map(i => `
          <div class="bg-[#212121] border border-[#2E2E2E] rounded-lg p-3 active:border-[#383838] transition-colors fade-in">
            <div class="flex items-start justify-between gap-2 mb-1">
              <span class="text-xs font-medium text-white leading-tight">${i.title}</span>
              <span class="text-[9px] text-green-400 bg-green-400/10 px-1.5 py-0.5 rounded uppercase font-semibold flex-shrink-0">${i.status}</span>
            </div>
            <div class="text-[10px] text-gray-600 mb-1">${i.date}</div>
            <p class="text-[11px] text-gray-400 leading-relaxed">${i.desc}</p>
          </div>
        `).join('');
      }

      function updateSummary() {
        let online = 0, degraded = 0, offline = 0, totalLatency = 0, count = 0;
        const total = getServiceCount();
        Object.entries(serviceStatuses).forEach(([, s]) => {
          if (s.status === 'online') online++;
          else if (s.status === 'degraded') degraded++;
          else if (s.status === 'offline') offline++;
          if (s.latencyMs) { totalLatency += s.latencyMs; count++; }
        });
        const avgLatency = count > 0 ? Math.round(totalLatency / count) : 0;
        document.getElementById('stat-online').textContent = online;
        document.getElementById('stat-degraded').textContent = degraded;
        document.getElementById('stat-offline').textContent = offline;
        document.getElementById('stat-avg-latency').textContent = avgLatency > 0 ? `${avgLatency}ms` : '—';
        document.getElementById('bar-online').style.width = total > 0 ? `${(online/total)*100}%` : '0%';
        document.getElementById('bar-degraded').style.width = total > 0 ? `${(degraded/total)*100}%` : '0%';
        document.getElementById('bar-offline').style.width = total > 0 ? `${(offline/total)*100}%` : '0%';
        document.getElementById('bar-latency').style.width = avgLatency > 0 ? `${Math.min(avgLatency/10, 100)}%` : '0%';
        if (count > 0) { uptimeData.total++; if (offline === 0) uptimeData.online++; }
        const uptimePercent = uptimeData.total > 0 ? ((uptimeData.online / uptimeData.total) * 100).toFixed(1) : '100';
        document.getElementById('uptime-percent').textContent = `${uptimePercent}%`;
        const banner = document.getElementById('overall-banner');
        const dot = document.getElementById('overall-dot');
        const title = document.getElementById('overall-title');
        if (offline > 3) {
          banner.className = 'bg-[#212121] border border-red-500/30 rounded-lg p-3 mb-4 flex items-center gap-3 transition-all duration-300';
          dot.className = 'w-3 h-3 rounded-full bg-red-400 animate-pulse flex-shrink-0';
          title.textContent = `${offline} services down`;
        } else if (offline > 0 || degraded > 3) {
          banner.className = 'bg-[#212121] border border-yellow-500/30 rounded-lg p-3 mb-4 flex items-center gap-3 transition-all duration-300';
          dot.className = 'w-3 h-3 rounded-full bg-yellow-400 pulse-dot-slow flex-shrink-0';
          title.textContent = 'Some systems degraded';
        } else {
          banner.className = 'bg-[#212121] border border-green-500/30 rounded-lg p-3 mb-4 flex items-center gap-3 transition-all duration-300';
          dot.className = 'w-3 h-3 rounded-full bg-green-400 pulse-dot flex-shrink-0';
          title.textContent = 'All Systems Operational';
        }
      }

      function updateTimeDisplay() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'UTC', hour12: false });
        document.getElementById('last-checked').textContent = timeStr + ' UTC';
        document.getElementById('last-checked-footer').textContent = timeStr + ' UTC';
        document.getElementById('overall-sub').textContent = 'Auto-refresh 5s';
        document.getElementById('total-checks-footer').textContent = `${totalChecks} checks`;
      }

      async function pingEndpoint(service, index) {
        const startTime = performance.now();
        const url = `${BASE_URL}${service.path}`;
        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 8000);
          const res = await fetch(url, { method: 'GET', signal: controller.signal, cache: 'no-store' });
          clearTimeout(timeout);
          const latency = Math.round(performance.now() - startTime);
          let status = 'online';
          if (!res.ok) status = 'offline';
          else if (latency > 1500) status = 'degraded';
          serviceStatuses[index] = { status, latency: `${latency}ms`, latencyMs: latency };
        } catch (err) {
          serviceStatuses[index] = { status: 'offline', latency: err.name === 'AbortError' ? 'timeout' : 'error', latencyMs: null };
        }
        totalChecks++;
        updateServiceUI(index, serviceStatuses[index].status, serviceStatuses[index].latency);
      }

      function updateServiceUI(index, status, latency) {
        const dot = document.getElementById(`svc-dot-${index}`);
        const statusEl = document.getElementById(`svc-status-${index}`);
        const latencyEl = document.getElementById(`svc-latency-${index}`);
        const row = document.getElementById(`svc-row-${index}`);
        if (row) { row.classList.add('slide-in'); setTimeout(() => row.classList.remove('slide-in'), 250); }
        if (dot) {
          dot.className = `w-2 h-2 rounded-full flex-shrink-0 transition-all duration-300 ${
            status === 'online' ? 'bg-green-400 live-glow' : status === 'degraded' ? 'bg-yellow-400 degraded-glow' : status === 'offline' ? 'bg-red-400 offline-glow' : 'bg-blue-400 animate-pulse'
          }`;
        }
        if (statusEl) {
          statusEl.className = `text-[9px] uppercase tracking-wider px-1.5 py-0.5 rounded font-semibold transition-all duration-300 ${
            status === 'online' ? 'text-green-400 bg-green-400/10' : status === 'degraded' ? 'text-yellow-400 bg-yellow-400/10' : status === 'offline' ? 'text-red-400 bg-red-400/10' : 'text-blue-400 bg-blue-400/10'
          }`;
          statusEl.textContent = status;
        }
        if (latencyEl) latencyEl.textContent = latency;
      }

      async function checkAllEndpoints() {
        if (isChecking) return;
        isChecking = true;
        const btn = document.getElementById('refresh-btn');
        btn.classList.add('opacity-40', 'pointer-events-none');
        updateTimeDisplay();
        const allServices = serviceCategories.flatMap(c => c.services);
        const batchSize = 8;
        for (let i = 0; i < allServices.length; i += batchSize) {
          const batch = allServices.slice(i, i + batchSize);
          const promises = batch.map((service, batchIndex) => pingEndpoint(service, i + batchIndex));
          await Promise.allSettled(promises);
          updateSummary();
        }
        btn.classList.remove('opacity-40', 'pointer-events-none');
        isChecking = false;
      }

      function manualRefresh() { if (!isChecking) checkAllEndpoints(); }

      document.addEventListener('DOMContentLoaded', () => {
        renderServiceList();
        renderIncidents();
        checkAllEndpoints();
        setInterval(checkAllEndpoints, CHECK_INTERVAL);
      });
    </script>
  </body>
</html>
