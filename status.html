  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['Ubuntu Mono', 'monospace'],
            sans: ['Space Grotesk', 'system-ui', 'sans-serif']
          }
        }
      }
    }

  <style>
    * { -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none !important; }
    
    body { 
      position: relative; scroll-behavior: smooth; letter-spacing: 0.025em; 
      background-color: #181818; overscroll-behavior: none; -webkit-font-smoothing: antialiased;
    }
    
    body::before {
      content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background-image: linear-gradient(rgba(148,163,184,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,0.04) 1px, transparent 1px);
      background-size: 32px 32px; pointer-events: none;
    }
    
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes pulse-fast { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes slideIn { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:translateX(0)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    
    .pulse-dot{animation:pulse 2s infinite}
    .pulse-dot-slow{animation:pulse 3s infinite}
    .pulse-dot-fast{animation:pulse-fast 1s infinite}
    .fade-in{animation:fadeIn .35s ease-out forwards;opacity:0}
    .slide-in{animation:slideIn .25s ease-out}
    
    .live-glow{box-shadow:0 0 6px rgba(74,222,128,.4)}
    .degraded-glow{box-shadow:0 0 6px rgba(250,204,21,.4)}
    .offline-glow{box-shadow:0 0 6px rgba(248,113,113,.4)}
    
    .safe-bottom{padding-bottom:env(safe-area-inset-bottom,16px)}
    
    .stat-card {
      background: #212121;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: border-color 0.3s;
    }
    
    .stat-card:hover {
      border-color: #383838;
    }
    
    .service-row {
      background: #212121;
      border: 1px solid #2e2e2e;
      transition: all 0.2s;
    }
    
    .service-row:hover {
      background: #1c1c1c;
      border-color: #383838;
    }
    
    .shimmer-effect {
      background: linear-gradient(90deg, #212121 0%, #2a2a2a 50%, #212121 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
  </style>
</head>
<body class="bg-[#181818] text-gray-200 antialiased font-sans min-h-screen">
  
  <!-- Header -->
  <header class="sticky top-0 z-50 bg-[#181818]/95 backdrop-blur-sm border-b border-[#2E2E2E]">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="font-bold text-white text-base flex items-center gap-2" style="font-family: 'Space Grotesk', sans-serif;">
        Kyoto<span class="text-gray-400">API</span>
        <span class="text-[9px] text-green-400 bg-green-400/10 px-1.5 py-0.5 rounded-full flex items-center gap-1">
          <span class="w-1 h-1 bg-green-400 rounded-full pulse-dot-fast"></span> LIVE
        </span>
      </a>
      <div class="flex items-center gap-4 text-xs">
        <a href="/" class="text-gray-400 hover:text-white transition-colors">Home</a>
        <a href="/category" class="text-gray-400 hover:text-white transition-colors">Category</a>
        <a href="/status" class="text-white font-medium transition-colors">Status</a>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-4 safe-bottom">
    
    <!-- Overall Status Banner -->
    <div id="overall-banner" class="bg-[#212121] border border-[#2E2E2E] rounded-xl p-4 mb-6 flex items-center gap-4 transition-all duration-300 fade-in">
      <div id="overall-dot" class="w-3 h-3 rounded-full bg-blue-400 pulse-dot-fast flex-shrink-0"></div>
      <div class="flex-1 min-w-0">
        <h2 class="text-sm font-semibold text-white truncate" id="overall-title">Checking systems...</h2>
        <p class="text-[11px] text-gray-400 mt-0.5 flex items-center gap-1.5 flex-wrap">
          <span id="overall-sub">Initializing...</span>
          <span class="text-gray-600">·</span>
          <span id="last-checked" class="text-gray-500">--</span>
        </p>
      </div>
      <div class="text-right flex-shrink-0">
        <div class="text-lg font-bold text-white font-mono" id="uptime-percent">--</div>
        <div class="text-[9px] text-gray-500">24h uptime</div>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
      <div class="stat-card fade-in">
        <div class="text-2xl font-bold text-green-400 font-mono" id="stat-online">0</div>
        <div class="text-[10px] text-gray-500 uppercase tracking-wider mt-1">Online</div>
        <div class="mt-2 h-1 bg-[#2E2E2E] rounded-full overflow-hidden">
          <div class="h-full bg-green-400 rounded-full transition-all duration-500" id="bar-online" style="width:0%"></div>
        </div>
      </div>
      <div class="stat-card fade-in">
        <div class="text-2xl font-bold text-yellow-400 font-mono" id="stat-degraded">0</div>
        <div class="text-[10px] text-gray-500 uppercase tracking-wider mt-1">Degraded</div>
        <div class="mt-2 h-1 bg-[#2E2E2E] rounded-full overflow-hidden">
          <div class="h-full bg-yellow-400 rounded-full transition-all duration-500" id="bar-degraded" style="width:0%"></div>
        </div>
      </div>
      <div class="stat-card fade-in">
        <div class="text-2xl font-bold text-red-400 font-mono" id="stat-offline">0</div>
        <div class="text-[10px] text-gray-500 uppercase tracking-wider mt-1">Offline</div>
        <div class="mt-2 h-1 bg-[#2E2E2E] rounded-full overflow-hidden">
          <div class="h-full bg-red-400 rounded-full transition-all duration-500" id="bar-offline" style="width:0%"></div>
        </div>
      </div>
      <div class="stat-card fade-in">
        <div class="text-2xl font-bold text-blue-400 font-mono" id="stat-avg-latency">0ms</div>
        <div class="text-[10px] text-gray-500 uppercase tracking-wider mt-1">Avg Latency</div>
        <div class="mt-2 h-1 bg-[#2E2E2E] rounded-full overflow-hidden">
          <div class="h-full bg-blue-400 rounded-full transition-all duration-500" id="bar-latency" style="width:0%"></div>

    <!-- Services Section -->
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-sm font-semibold text-white flex items-center gap-2">

    <div id="service-container" class="space-y-2 mb-6"></div>

        <span id="last-checked-footer" class="text-gray-400">--</span>
        <span class="mx-1.5 text-gray-600">·</span>
        <span id="total-checks-footer">0 checks</span>
      </div>
      <button onclick="manualRefresh()" id="refresh-btn" class="flex items-center gap-1.5 bg-[#212121] border border-[#2E2E2E] text-gray-400 active:text-white active:border-[#383838] text-xs py-1.5 px-3 rounded-lg transition-all touch-manipulation">
        <i class="fas fa-rotate-right text-[10px]"></i> Refresh
      </button>
    </div>
  </main>

  <!-- Footer -->

      <div class="flex justify-center gap-5 mt-2">
        <a href="/" class="text-[11px] text-gray-400 hover:text-white transition-colors">Home</a>
        <a href="/category" class="text-[11px] text-gray-400 hover:text-white transition-colors">Category</a>
        <a href="/status" class="text-[11px] text-white transition-colors">Status</a>
      </div>
    </div>
  </footer>

  <script>
    const BASE_URL = 'https://kyoto-rest-api.vercel.app';
    const CHECK_INTERVAL = 5000;
    let serviceStatuses = {};
    let totalChecks = 0;
    let isChecking = false;
    let uptimeData = { online: 0, total: 0 };

    const serviceCategories = [
      { name: 'AI', icon: 'fa-brain', services: [

        { name: 'Detik', path: '/api/news/detik' },

        { name: 'Chess', path: '/api/games/chess-puzzle' },
      ]},
      { name: 'Info', icon: 'fa-circle-info', services: [
        { name: 'Wikipedia', path: '/api/info/wikipedia?title=Indonesia' },
        { name: 'Dictionary', path: '/api/info/dictionary?word=hello' },
        { name: 'GitHub', path: '/api/info/github?username=torvalds' },
        { name: 'Crypto', path: '/api/info/crypto?coin=bitcoin' },
        { name: 'Movie', path: '/api/info/movie?title=Inception' },
        { name: 'Lyrics', path: '/api/info/lyrics?artist=Coldplay&song=Yellow' },
      ]},
      { name: 'Maker', icon: 'fa-wand-magic-sparkles', services: [
        { name: 'Canvas', path: '/api/maker/canvas?text=test' },
        { name: 'Avatar', path: '/api/maker/avatar?seed=test' },
        { name: 'QR Code', path: '/api/maker/qr-styled?text=test' },
      ]},
      { name: 'Stalker', icon: 'fa-magnifying-glass', services: [
        { name: 'IP Lookup', path: '/api/stalker/ip?ip=8.8.8.8' },
        { name: 'My IP', path: '/api/stalker/my-ip' },
        { name: 'DNS', path: '/api/stalker/dns?domain=google.com' },
        { name: 'Website Status', path: '/api/stalker/website-status?url=https://google.com' },
      ]},
      { name: 'Tools', icon: 'fa-screwdriver-wrench', services: [
        { name: 'QR', path: '/api/tools/qr?text=test' },
        { name: 'Shortlink', path: '/api/tools/shortlink?url=https://google.com' },
        { name: 'Weather', path: '/api/tools/cuaca?city=Tokyo' },
        { name: 'Calculator', path: '/api/tools/calculator?expr=2+2' },
        { name: 'NGL Spammer', path: '/api/tools/ngl?username=test&message=ping&count=1' },
      ]},
      { name: 'Media', icon: 'fa-image', services: [
        { name: 'Wallpaper', path: '/api/media/wallpaper?theme=nature' },
        { name: 'Art', path: '/api/media/art?subject=cat&style=oil+painting' },
        { name: 'YouTube', path: '/api/media/youtube?url=https://youtube.com/watch?v=dQw4w9WgXcQ' },
        { name: 'Unsplash', path: '/api/media/unsplash?query=nature' },
      ]},
    ];

    const incidents = [
      { title: 'v3.0 — Major Rebuild', date: 'May 2026', desc: 'Complete restructure. 100+ endpoints, 10 categories. New Internet category. Removed Fun & Quran.', status: 'resolved' },
      { title: 'v2.1 — Zodiak Consolidated', date: 'May 2026', desc: 'Zodiak endpoint merged into Tools. All systems operational.', status: 'resolved' },
      { title: 'v2.0 — 55+ Endpoints Live', date: 'May 2026', desc: 'Major release. Free, no API key required.', status: 'resolved' },
    ];

    function getServiceCount() {
      return serviceCategories.reduce((sum, cat) => sum + cat.services.length, 0);
    }

    function renderServiceList() {
      const container = document.getElementById('service-container');
      let html = '';
      let globalIndex = 0;
      
      serviceCategories.forEach(cat => {
        html += `
          <div class="mb-3 fade-in">
            <div class="flex items-center gap-2 mb-2 px-1">
              <i class="fas ${cat.icon} text-gray-500 text-[10px]"></i>
              <span class="text-[10px] text-gray-500 uppercase tracking-wider font-semibold">${cat.name}</span>
              <span class="text-[9px] text-gray-600">${cat.services.length}</span>
            </div>
            <div class="rounded-xl overflow-hidden border border-[#2E2E2E]">`;
        
        cat.services.forEach(svc => {
          const idx = globalIndex;
          const status = serviceStatuses[idx] || { status: 'pending', latency: '—' };
          
          html += `
            <div class="service-row flex items-center justify-between py-2.5 px-4 border-b border-[#2e2e2e] last:border-b-0" id="svc-row-${idx}">
              <div class="flex items-center gap-3 min-w-0 flex-1">
                <div id="svc-dot-${idx}" class="w-2 h-2 rounded-full flex-shrink-0 transition-all duration-300 ${
                  status.status === 'online' ? 'bg-green-400 live-glow' : 
                  status.status === 'degraded' ? 'bg-yellow-400 degraded-glow' : 
                  status.status === 'offline' ? 'bg-red-400 offline-glow' : 
                  'bg-blue-400 animate-pulse'
                }"></div>
                <span class="text-xs text-gray-200 truncate">${svc.name}</span>
              </div>
              <div class="flex items-center gap-3 flex-shrink-0">
                <span class="text-[10px] text-gray-500 font-mono w-14 text-right" id="svc-latency-${idx}">${status.latency}</span>
                <span id="svc-status-${idx}" class="text-[9px] uppercase tracking-wider px-2 py-0.5 rounded-full font-semibold transition-all duration-300 ${
                  status.status === 'online' ? 'text-green-400 bg-green-400/10' : 
                  status.status === 'degraded' ? 'text-yellow-400 bg-yellow-400/10' : 
                  status.status === 'offline' ? 'text-red-400 bg-red-400/10' : 
                  'text-blue-400 bg-blue-400/10'
                }">${status.status}</span>
              </div>
            </div>`;
          globalIndex++;
        });
        
        html += `</div></div>`;
      });
      
      container.innerHTML = html;
    }

    function renderIncidents() {
      document.getElementById('incident-list').innerHTML = incidents.map(i => `
        <div class="bg-[#212121] border border-[#2E2E2E] rounded-lg p-3 fade-in">
          <div class="flex items-start justify-between gap-2 mb-1">
            <span class="text-xs font-medium text-white leading-tight">${i.title}</span>
            <span class="text-[9px] text-green-400 bg-green-400/10 px-1.5 py-0.5 rounded-full uppercase font-semibold flex-shrink-0">${i.status}</span>
          </div>
          <div class="text-[10px] text-gray-600 mb-1">${i.date}</div>
          <p class="text-[11px] text-gray-400 leading-relaxed">${i.desc}</p>
        </div>
      `).join('');
    }

    function updateSummary() {
      let online = 0, degraded = 0, offline = 0, totalLatency = 0, count = 0;
      const total = getServiceCount();
      
      Object.entries(serviceStatuses).forEach(([, s]) => {
        if (s.status === 'online') online++;
        else if (s.status === 'degraded') degraded++;
        else if (s.status === 'offline') offline++;
        if (s.latencyMs) { totalLatency += s.latencyMs; count++; }
      });
      
      const avgLatency = count > 0 ? Math.round(totalLatency / count) : 0;
      
      document.getElementById('stat-online').textContent = online;
      document.getElementById('stat-degraded').textContent = degraded;
      document.getElementById('stat-offline').textContent = offline;
      document.getElementById('stat-avg-latency').textContent = avgLatency > 0 ? `${avgLatency}ms` : '—';
      
      document.getElementById('bar-online').style.width = total > 0 ? `${(online/total)*100}%` : '0%';
      document.getElementById('bar-degraded').style.width = total > 0 ? `${(degraded/total)*100}%` : '0%';
      document.getElementById('bar-offline').style.width = total > 0 ? `${(offline/total)*100}%` : '0%';
      document.getElementById('bar-latency').style.width = avgLatency > 0 ? `${Math.min(avgLatency/10, 100)}%` : '0%';
      
      if (count > 0) { uptimeData.total++; if (offline === 0) uptimeData.online++; }
      
      const uptimePercent = uptimeData.total > 0 ? ((uptimeData.online / uptimeData.total) * 100).toFixed(1) : '100.0';
      document.getElementById('uptime-percent').textContent = `${uptimePercent}%`;
      
      const banner = document.getElementById('overall-banner');
      const dot = document.getElementById('overall-dot');
      const title = document.getElementById('overall-title');
      const sub = document.getElementById('overall-sub');
      
      if (offline > 3) {
        banner.className = 'bg-[#212121] border border-red-500/30 rounded-xl p-4 mb-6 flex items-center gap-4 transition-all duration-300';
        dot.className = 'w-3 h-3 rounded-full bg-red-400 animate-pulse flex-shrink-0';
        title.textContent = `${offline} services offline`;
        sub.textContent = 'Major outage detected';
      } else if (offline > 0 || degraded > 3) {
        banner.className = 'bg-[#212121] border border-yellow-500/30 rounded-xl p-4 mb-6 flex items-center gap-4 transition-all duration-300';
        dot.className = 'w-3 h-3 rounded-full bg-yellow-400 pulse-dot-slow flex-shrink-0';
        title.textContent = 'Some systems degraded';
        sub.textContent = 'Minor performance issues';
      } else {
        banner.className = 'bg-[#212121] border border-green-500/30 rounded-xl p-4 mb-6 flex items-center gap-4 transition-all duration-300';
        dot.className = 'w-3 h-3 rounded-full bg-green-400 pulse-dot flex-shrink-0';
        title.textContent = 'All Systems Operational';
        sub.textContent = 'No incidents reported';
      }
    }

    function updateTimeDisplay() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'UTC', hour12: false });
      document.getElementById('last-checked').textContent = timeStr + ' UTC';
      document.getElementById('last-checked-footer').textContent = timeStr + ' UTC';
      document.getElementById('total-checks-footer').textContent = `${totalChecks} checks`;
    }

    async function pingEndpoint(service, index) {
      const startTime = performance.now();
      const url = `${BASE_URL}${service.path}`;
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);
        const res = await fetch(url, { method: 'GET', signal: controller.signal, cache: 'no-store' });
        clearTimeout(timeout);
        const latency = Math.round(performance.now() - startTime);
        let status = res.ok ? 'online' : 'offline';
        if (res.ok && latency > 1500) status = 'degraded';
        serviceStatuses[index] = { status, latency: `${latency}ms`, latencyMs: latency };
      } catch (err) {
        serviceStatuses[index] = { status: 'offline', latency: err.name === 'AbortError' ? 'timeout' : 'error', latencyMs: null };
      }
      totalChecks++;
      updateServiceUI(index, serviceStatuses[index].status, serviceStatuses[index].latency);
    }

    function updateServiceUI(index, status, latency) {
      const dot = document.getElementById(`svc-dot-${index}`);
      const statusEl = document.getElementById(`svc-status-${index}`);
      const latencyEl = document.getElementById(`svc-latency-${index}`);
      const row = document.getElementById(`svc-row-${index}`);
      
      if (row) { row.classList.add('slide-in'); setTimeout(() => row.classList.remove('slide-in'), 250); }
      if (dot) {
        dot.className = `w-2 h-2 rounded-full flex-shrink-0 transition-all duration-300 ${
          status === 'online' ? 'bg-green-400 live-glow' : 
          status === 'degraded' ? 'bg-yellow-400 degraded-glow' : 
          status === 'offline' ? 'bg-red-400 offline-glow' : 
          'bg-blue-400 animate-pulse'
        }`;
      }
      if (statusEl) {
        statusEl.className = `text-[9px] uppercase tracking-wider px-2 py-0.5 rounded-full font-semibold transition-all duration-300 ${
          status === 'online' ? 'text-green-400 bg-green-400/10' : 
          status === 'degraded' ? 'text-yellow-400 bg-yellow-400/10' : 
          status === 'offline' ? 'text-red-400 bg-red-400/10' : 
          'text-blue-400 bg-blue-400/10'
        }`;
        statusEl.textContent = status;
      }
      if (latencyEl) latencyEl.textContent = latency;
    }

    async function checkAllEndpoints() {
      if (isChecking) return;
      isChecking = true;
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('opacity-40', 'pointer-events-none');
      updateTimeDisplay();
      
      const allServices = serviceCategories.flatMap(c => c.services);
      const batchSize = 6;
      
      for (let i = 0; i < allServices.length; i += batchSize) {
        const batch = allServices.slice(i, i + batchSize);
        const promises = batch.map((service, batchIndex) => pingEndpoint(service, i + batchIndex));
        await Promise.allSettled(promises);
        updateSummary();
      }
      
      btn.classList.remove('opacity-40', 'pointer-events-none');
      isChecking = false;
    }

    function manualRefresh() {
      if (!isChecking) checkAllEndpoints();
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderServiceList();
      renderIncidents();
      checkAllEndpoints();
      setInterval(checkAllEndpoints, CHECK_INTERVAL);
    });
  </script>
</body>
</html>
